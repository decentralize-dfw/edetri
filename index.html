<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>EDETRI — Moodboard</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Archivo:wght@200;300;400;500&family=IBM+Plex+Mono:wght@300;400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/mammoth@1.8.0/mammoth.browser.min.js"></script>
<style>
:root{--black:#090807;--cream:#e8e0d0;--silver:#b0a890;--copper:#a86828;--burgundy:#581020;--gold:#b89850;--dim:#2a2720}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;scrollbar-width:none}html::-webkit-scrollbar{display:none}
body{background:var(--black);color:var(--cream);font-family:'Archivo',sans-serif;font-weight:200;min-height:100vh;overflow-x:hidden;scrollbar-width:none}body::-webkit-scrollbar{display:none}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");opacity:.04;pointer-events:none;z-index:9999}

/* HEADER */
#siteHeader{position:fixed;top:0;left:0;right:0;z-index:400;background:rgba(9,8,7,.95);backdrop-filter:blur(12px);border-bottom:1px solid rgba(176,168,144,.12);transition:transform .22s ease}
body.header-hidden #siteHeader{transform:translateY(-100%)}
body:not(.gallery-mode) #siteHeader{background:none;backdrop-filter:none;border-bottom:none;pointer-events:none;user-select:none}
body:not(.gallery-mode) #siteHeader>*{pointer-events:none}
body:not(.gallery-mode) #siteHeader button:not(#filterCollapseBtn),body:not(.gallery-mode) #siteHeader a{pointer-events:all}
#top-bar-row{display:flex;align-items:center;gap:12px;padding:10px 24px 10px 14px;flex-wrap:nowrap}
.header-title{font-family:'Playfair Display',serif;font-size:17px;font-weight:400;letter-spacing:.12em;color:var(--cream);text-transform:uppercase;white-space:nowrap}
.header-title span{color:var(--copper);font-style:italic}
#site-logo{height:26px;width:auto;filter:invert(1);display:block;pointer-events:none;flex-shrink:0}
#header-moodboard{display:none!important}
#modeToggleBtn{order:2;background:var(--gold);border:1px solid var(--gold);color:var(--black);font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.1em;padding:6px 13px;cursor:pointer;text-transform:uppercase;transition:all .2s;white-space:nowrap;flex-shrink:0;font-weight:500}
#modeToggleBtn:hover{background:var(--copper);border-color:var(--copper);color:var(--black)}
#wall-nav{display:none;align-items:center;gap:12px;flex-wrap:wrap;flex:1;order:4}
body.gallery-mode #wall-nav{display:flex}
#header-status{display:flex;align-items:center;gap:6px;flex-shrink:0;order:5}
body:not(.gallery-mode) #header-status{display:none}
#filter-row{display:none;align-items:center;padding:0 24px 8px 14px;gap:6px;min-height:28px}
body.gallery-mode #filter-row{display:flex}
body.filters-collapsed #filter-row .filter-bar{display:none}
body.filters-collapsed #wall-nav{display:none}
#filterCollapseBtn{background:none;border:none;color:var(--silver);cursor:pointer;font-size:11px;padding:2px 8px;transition:color .2s;flex-shrink:0;font-family:'IBM Plex Mono',monospace;letter-spacing:.1em;display:none}
#filterCollapseBtn:hover{color:var(--copper)}
.status-dot{width:6px;height:6px;border-radius:50%;background:var(--silver);display:inline-block;margin-right:6px;transition:background .3s}
.status-dot.loading{background:var(--gold);animation:pulse 1s infinite}
.status-dot.ready{background:#5a8a5a}
.status-dot.error{background:var(--burgundy)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.status-text{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--silver);letter-spacing:.06em}
.btn-map{background:none;border:1px solid rgba(176,168,144,.25);color:var(--silver);font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.1em;padding:6px 13px;cursor:pointer;transition:all .2s;white-space:nowrap;text-transform:uppercase}
.btn-map:hover{border-color:var(--copper);color:var(--copper);background:rgba(168,104,40,.08)}

/* DOCUMENT TYPOGRAPHY (shared by all docx content areas) */
.doc-content{color:var(--cream);font-family:'Archivo',sans-serif;font-size:13px;font-weight:300;line-height:1.85}
.doc-content h1{font-family:'Playfair Display',serif;font-style:italic;font-weight:400;font-size:20px;color:var(--cream);letter-spacing:.02em;margin:2.2em 0 .7em;line-height:1.25;border-bottom:1px solid rgba(176,168,144,.1);padding-bottom:.4em}
.doc-content h2{font-family:'IBM Plex Mono',monospace;font-weight:400;font-size:10px;color:var(--copper);text-transform:uppercase;letter-spacing:.22em;margin:2em 0 .5em}
.doc-content h3{font-family:'IBM Plex Mono',monospace;font-weight:400;font-size:9px;color:var(--silver);text-transform:uppercase;letter-spacing:.18em;margin:1.6em 0 .4em}
.doc-content h4{font-family:'IBM Plex Mono',monospace;font-weight:300;font-size:8px;color:rgba(176,168,144,.45);text-transform:uppercase;letter-spacing:.16em;margin:1.3em 0 .3em}
.doc-content p{margin:0 0 .9em;text-align:justify;text-align-last:left}
.doc-content .doc-block{margin:0 0 .9em;text-align:justify;text-align-last:left}
.doc-content .doc-line{display:block}
.doc-content .doc-line+.doc-line{margin-top:.5em}
.doc-content strong{font-weight:500;color:var(--cream)}
.doc-content em{font-style:italic;color:var(--gold);font-weight:300}
.doc-content ul,.doc-content ol{padding-left:1.4em;margin:0 0 .9em}
.doc-content li{margin-bottom:.35em;text-align:justify;text-align-last:left}
.doc-content ul li::marker{color:rgba(168,104,40,.6)}
.doc-content ol li::marker{color:rgba(168,104,40,.6);font-family:'IBM Plex Mono',monospace;font-size:10px}
.doc-content blockquote{border-left:2px solid rgba(168,104,40,.35);padding:.2em 0 .2em 1em;margin:1em 0;font-style:italic;color:rgba(176,168,144,.65)}
.doc-content a{color:var(--copper);text-decoration:none;border-bottom:1px solid rgba(168,104,40,.3)}
.doc-content a:hover{border-bottom-color:var(--copper)}

/* RAPOR OVERLAY */
#raporOverlay{display:none;position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.75);align-items:center;justify-content:center;padding:20px}
#raporOverlay.open{display:flex}
#raporInner{position:relative;background:var(--black);border:1px solid rgba(176,168,144,.12);width:44%;max-width:680px;max-height:85vh;overflow-y:auto;overflow-x:hidden;padding:32px 36px 44px;box-sizing:border-box;scrollbar-width:thin;scrollbar-color:rgba(168,104,40,.2) transparent}
#raporInner::-webkit-scrollbar{width:4px}
#raporInner::-webkit-scrollbar-thumb{background:rgba(168,104,40,.3);border-radius:2px}
#raporClose{position:absolute;top:12px;right:14px;background:none;border:none;color:var(--silver);font-size:18px;cursor:pointer;line-height:1;z-index:1}
#raporClose:hover{color:var(--copper)}
#raporLoading{color:var(--silver);font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.1em;padding:40px 0}

/* FILTER BAR */
.filter-bar{display:flex;align-items:center;gap:6px;padding:0 0 12px;overflow-x:auto;scrollbar-width:none;flex-wrap:wrap}
.filter-bar::-webkit-scrollbar{display:none}
.filter-chip{background:none;border:1px solid rgba(176,168,144,.18);color:rgba(176,168,144,.6);font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;padding:5px 11px;cursor:pointer;transition:all .2s;white-space:nowrap;border-radius:1px;flex-shrink:0}
.filter-chip:hover{border-color:rgba(176,168,144,.5);color:var(--cream)}
.filter-chip.active{background:var(--copper);border-color:var(--copper);color:var(--black);font-weight:400}
.filter-chip.all-chip.active{background:rgba(176,168,144,.15);border-color:var(--silver);color:var(--cream)}

/* MASONRY */
.gallery-wrap{padding:24px 8px;user-select:none;-webkit-user-select:none}
.masonry{column-count:5;column-gap:8px}
.card{break-inside:avoid;margin-bottom:8px;position:relative;cursor:pointer;border-radius:2px;background:var(--dim);user-select:none;-webkit-user-select:none}
.card.hidden{display:none}
.card-img-wrap{overflow:hidden;border-radius:2px 2px 0 0;position:relative}
.card-img-wrap img{display:block;width:100%;height:auto;transition:transform .4s ease;user-select:none;-webkit-user-select:none;pointer-events:none}
.card:hover .card-img-wrap img{transform:scale(1.03)}
.card-overlay{position:absolute;bottom:0;left:0;right:0;padding:20px 8px 8px;background:linear-gradient(to top,rgba(9,8,7,.85),transparent);opacity:0;transition:opacity .3s;display:flex;flex-direction:column;align-items:stretch;gap:4px;user-select:none;-webkit-user-select:none}
.card:hover .card-overlay{opacity:1}
.card-meta-row{display:flex;align-items:center;gap:5px}
.card-color{width:8px;height:8px;border-radius:50%;flex-shrink:0;border:1px solid rgba(255,255,255,.2)}
.card-type{font-family:'IBM Plex Mono',monospace;font-size:8px;letter-spacing:.08em;color:var(--cream);text-transform:uppercase;opacity:.85;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;user-select:none;-webkit-user-select:none}

/* STAR RATING */
.star-rating{display:flex;gap:1px;justify-content:center;line-height:1}
.star{font-size:12px;background:linear-gradient(to right,var(--gold) var(--fill,0%),rgba(176,168,144,.22) var(--fill,0%));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.card-stars{display:flex;justify-content:center}
.map-island-bottom{position:absolute;bottom:0;left:0;right:0;height:34px;background:linear-gradient(to top,rgba(9,8,7,.92) 55%,transparent);pointer-events:none;opacity:0;transition:opacity .18s}
.map-island:hover .map-island-bottom{opacity:1}
.map-stars{position:absolute;bottom:16px;left:0;right:0;text-align:center;pointer-events:none}
.map-stars .star{font-size:10px;cursor:pointer;background:linear-gradient(to right,var(--gold) var(--fill,0%),rgba(176,168,144,.6) var(--fill,0%));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

/* STAR FILTER */
#star-filter-wrap{position:fixed;bottom:72px;left:24px;z-index:350;display:none;pointer-events:all}
body.has-data #star-filter-wrap{display:block}
body.has-data.gallery-mode #star-filter-wrap{bottom:76px}
#star-filter-btn{background:rgba(9,8,7,.8);backdrop-filter:blur(10px);border:1px solid rgba(176,168,144,.15);color:rgba(176,168,144,.5);font-family:'IBM Plex Mono',monospace;font-size:14px;padding:7px 12px;cursor:pointer;border-radius:2px;line-height:1;transition:all .2s;user-select:none;-webkit-user-select:none}
#star-filter-btn:hover{border-color:rgba(176,168,144,.4);color:var(--gold)}
#star-filter-btn.has-active{border-color:var(--gold);color:var(--gold);background:rgba(184,152,80,.08)}
#star-filter-panel{position:absolute;bottom:calc(100% + 8px);left:0;background:rgba(9,8,7,.95);backdrop-filter:blur(12px);border:1px solid rgba(176,168,144,.15);border-radius:2px;padding:4px 0;min-width:72px;display:none}
#star-filter-panel.open{display:block}
.sfp-row{padding:7px 14px;cursor:pointer;color:rgba(176,168,144,.55);font-family:'IBM Plex Mono',monospace;font-size:11px;user-select:none;transition:color .15s,background .15s;white-space:nowrap}
.sfp-row:hover{color:var(--cream);background:rgba(255,255,255,.04)}
.sfp-row.active{color:var(--gold)}
.card-desc{display:none;background:#000;color:#fff;font-family:'Archivo',sans-serif;font-size:var(--desc-font-size,10px);font-weight:300;line-height:1.4;padding:4px 6px;word-break:break-word;overflow-wrap:break-word;border-radius:0 0 2px 2px;user-select:none;-webkit-user-select:none}
body.show-desc .card-desc{display:block}

/* SIZE SLIDER */
#sizeSliderWrap{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:150;display:none;align-items:center;gap:8px;background:rgba(9,8,7,.8);backdrop-filter:blur(10px);border:1px solid rgba(176,168,144,.15);padding:8px 14px;border-radius:2px;user-select:none;-webkit-user-select:none;touch-action:manipulation}
#colSlider{width:110px;height:2px;cursor:pointer;-webkit-appearance:none;appearance:none;background:rgba(176,168,144,.25);border-radius:1px;outline:none;border:none;padding:0;flex-shrink:0}
#colSlider::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:10px;height:10px;background:var(--copper);border-radius:0;cursor:pointer}
#colSlider::-moz-range-thumb{width:10px;height:10px;background:var(--copper);border-radius:0;border:none;cursor:pointer}
.size-step-btn{display:none;background:none;border:1px solid rgba(176,168,144,.25);color:var(--silver);font-family:'IBM Plex Mono',monospace;font-size:15px;width:28px;height:28px;cursor:pointer;align-items:center;justify-content:center;transition:all .2s;line-height:1;flex-shrink:0;padding:0}
.size-step-btn:hover{border-color:var(--copper);color:var(--copper)}
#sizeDisplay{display:none;font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--cream);min-width:18px;text-align:center;letter-spacing:.05em}

/* COMMENT TOGGLE */
#commentToggleWrap{position:fixed;bottom:24px;left:24px;z-index:200;display:none;align-items:center;gap:5px;background:rgba(9,8,7,.8);backdrop-filter:blur(10px);border:1px solid rgba(176,168,144,.15);padding:6px 10px;border-radius:2px;pointer-events:auto;user-select:none;-webkit-user-select:none;touch-action:manipulation}
body.has-data.gallery-mode #commentToggleWrap{display:flex;flex-direction:column;align-items:flex-start}
body:not(.gallery-mode) #commentToggleWrap{pointer-events:none}

body.gallery-mode #sizeSliderWrap{display:flex}
body.show-desc .card-desc{display:block!important}
.ctw-row{display:flex;align-items:center;gap:6px}
#commentToggleWrap label{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.1em;color:rgba(176,168,144,.4);text-transform:uppercase;cursor:pointer;user-select:none;white-space:nowrap}
#commentToggle,#edetriToggle{accent-color:var(--copper);cursor:pointer;width:12px;height:12px;flex-shrink:0}

/* NOTE DISPLAY (read-only on wall cards) */
.card-note-display{display:none;padding:4px 6px 5px;font-family:'Archivo',sans-serif;font-size:9px;font-weight:300;font-style:italic;color:rgba(196,162,90,.82);line-height:1.4;border-top:1px solid rgba(176,168,144,.07);white-space:pre-wrap;word-break:break-word;border-radius:0 0 2px 2px;pointer-events:none}
body.show-notes .card-note-display{display:block}
/* Star badge on masonry cards (DUVAR mode) when Edetri Yorum active */
.card-star-badge{position:absolute;top:4px;left:4px;z-index:7;font-family:'IBM Plex Mono',monospace;font-size:14px;color:var(--gold);background:rgba(0,0,0,.5);padding:2px 5px;border-radius:1px;display:none;pointer-events:none;line-height:1.2;letter-spacing:.02em}
body.show-notes.gallery-mode .card-star-badge{display:block}
/* MAP-ISLAND comment overlay (duvar wall UI) */
.map-island-comments{position:absolute;bottom:34px;left:0;right:0;z-index:6;display:none}
body.show-desc .map-island-comments,body.show-notes .map-island-comments{display:block}
.map-island-comments .card-desc{display:none!important;background:rgba(0,0,0,.88);color:#fff;font-family:'Archivo',sans-serif;font-size:7px;font-weight:300;line-height:1.35;padding:3px 5px;word-break:break-word;overflow:hidden;max-height:36px}
body.show-desc .map-island-comments .card-desc{display:block!important}
.map-island-comments .card-note-display{display:none!important;background:rgba(0,0,0,.75);color:rgba(196,162,90,.82);font-family:'Archivo',sans-serif;font-size:7px;font-style:italic;font-weight:300;line-height:1.35;padding:2px 5px;word-break:break-word;overflow:hidden;max-height:22px;border-top:1px solid rgba(176,168,144,.12);pointer-events:none}
body.show-notes .map-island-comments .card-note-display{display:block!important}
/* Star badge: top-left of island when Edetri Yorum active */
.island-star-badge{position:absolute;top:4px;left:4px;z-index:7;font-family:'IBM Plex Mono',monospace;font-size:7px;color:var(--gold);background:rgba(0,0,0,.5);padding:1px 3px;border-radius:1px;display:none;pointer-events:none;line-height:1.2;letter-spacing:.02em}
body.show-notes .island-star-badge{display:block}
.mip-note{width:100%;background:transparent;border:none;border-top:1px solid rgba(176,168,144,.1);color:rgba(176,168,144,.65);font-family:'Archivo',sans-serif;font-size:11px;font-weight:300;line-height:1.45;padding:6px 0 2px;resize:none;outline:none;min-height:32px;cursor:text;transition:color .15s}
.mip-note:focus{color:var(--cream)}
.mip-note::placeholder{color:rgba(176,168,144,.45);font-style:italic}
.modal-note{width:100%;background:transparent;border:none;border-top:1px solid rgba(176,168,144,.25);color:rgba(176,168,144,.75);font-family:'Archivo',sans-serif;font-size:12px;font-weight:300;line-height:1.5;padding:6px 0 2px;resize:none;outline:none;min-height:28px;cursor:text;max-width:50vw;transition:color .15s;margin-top:4px;overflow:hidden}
.modal-note:focus{color:var(--cream)}
.modal-note::placeholder{color:rgba(176,168,144,.55);font-style:italic}
@media(max-width:768px){.modal-note{max-width:85vw;font-size:11px}}

/* SPINNER */
.spinner{width:24px;height:24px;border:1px solid rgba(176,168,144,.2);border-top-color:var(--copper);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* MODAL */
.modal-backdrop{position:fixed;inset:0;background:rgba(9,8,7,.99);z-index:1000;opacity:0;pointer-events:none;transition:opacity .25s}
.modal-backdrop.open{opacity:1;pointer-events:all}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;position:absolute;top:0;left:0;right:0;z-index:10;background:linear-gradient(to bottom,rgba(9,8,7,.9),transparent)}
.modal-close{background:none;border:none;color:var(--silver);font-size:18px;cursor:pointer;width:34px;height:34px;display:flex;align-items:center;justify-content:center;border-radius:50%;transition:all .2s}
.modal-close:hover{background:rgba(176,168,144,.1);color:var(--cream)}
.modal-counter{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--silver);letter-spacing:.08em;opacity:.5}
.nav-arrows{display:flex;gap:8px}
.nav-btn{background:rgba(9,8,7,.6);border:1px solid rgba(176,168,144,.2);color:var(--silver);font-size:14px;width:34px;height:34px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;border-radius:2px}
.nav-btn:hover{border-color:var(--copper);color:var(--copper)}
.modal-image-full{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;overflow:hidden}
.modal-image-full img{width:100%;height:100%;object-fit:contain;display:block}
.modal-info-strip{position:absolute;bottom:0;left:0;right:0;padding:80px 28px 24px;background:linear-gradient(to top,rgba(9,8,7,.92),transparent);display:flex;align-items:flex-end;justify-content:space-between;gap:16px;z-index:10;pointer-events:none}
.modal-info-left{display:flex;flex-direction:column;gap:8px;pointer-events:all}
.modal-color-row{display:flex;align-items:center;gap:8px}
.modal-color-dot{width:10px;height:10px;border-radius:50%;border:1px solid rgba(255,255,255,.2);flex-shrink:0}
.modal-color-hex{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--silver);letter-spacing:.08em;opacity:.7}
.modal-title{font-family:'Playfair Display',serif;font-size:clamp(22px,4vw,42px);font-weight:400;font-style:italic;color:var(--cream);line-height:1.15;max-width:60vw}
.modal-desc-text{font-family:'Archivo',sans-serif;font-size:13px;font-weight:300;color:var(--silver);opacity:.75;line-height:1.5;max-width:50vw}
.modal-info-right{display:flex;flex-direction:column;align-items:flex-end;gap:10px;pointer-events:all}
.pinterest-link{display:flex;align-items:center;gap:6px;color:var(--silver);text-decoration:none;font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.08em;opacity:.4;transition:opacity .2s}
.pinterest-link:hover{opacity:.9;color:var(--copper)}
.keyboard-hint{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--silver);opacity:.45;letter-spacing:.06em}

/* MAP VIEW */
#mapView{position:fixed;inset:0;background:#060504;z-index:200;overflow:hidden;cursor:grab;user-select:none;touch-action:none}
#mapView:active{cursor:grabbing}
#mapStage{position:absolute;top:0;left:0;transform-origin:0 0;will-change:transform}
.map-ui-btn{position:fixed;top:18px;background:rgba(14,12,10,.92);border:1px solid rgba(176,168,144,.2);color:var(--silver);font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.1em;padding:8px 16px;cursor:pointer;z-index:300;transition:all .2s;text-transform:uppercase;backdrop-filter:blur(8px)}
.map-ui-btn:hover{border-color:var(--copper);color:var(--copper)}
#mapDuvarBtn{left:150px;top:13px}
#mapShuffleBtn{right:18px}
#mapShuffleBtn.active{border-color:var(--copper);color:var(--copper);background:rgba(168,104,40,.1)}
#mapYaklasimBtn{left:18px;top:58px}

function showToast(msg, dur) {
  const t = document.getElementById('toast');
  if (!t) return;
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), dur || 2800);
}

function txtToHtml(txt) {
  return txt.split(/\n\n+/)
    .map(p => {
      const lines = p.trim().split('\n').filter(l => l.trim());
      if (!lines.length) return '';
      return '<div class="doc-block">' + lines.map(l => '<span class="doc-line">' + l + '</span>').join('') + '</div>';
    })
    .filter(Boolean)
    .join('');
}

function toSlug(s) {
  return s.toLowerCase()
    .replace(/ğ/g,'g').replace(/ü/g,'u').replace(/ş/g,'s')
    .replace(/ö/g,'o').replace(/ç/g,'c').replace(/ı/g,'i')
    .replace(/[^a-z0-9\s]/g,' ')
    .trim()
    .replace(/\s+/g,'-');
}
function findDocForType(t) {
  const slug = toSlug(t);
  return SECTION_DOCS.find(s => slug === s.key || slug.startsWith(s.key + '-'));
}

function buildStarRating(rating) {
  if (!rating) return '';
  let html = '<div class="star-rating">';
  for (let i = 1; i <= 5; i++) {
    const fill = Math.min(100, Math.max(0, (rating - (i - 1)) * 100)).toFixed(1);
    html += `<span class="star" style="--fill:${fill}%">★</span>`;
  }
  html += '</div>';
  return html;
}

function buildInteractiveStarRating(idx, rating) {
  let html = `<div class="star-rating star-interactive" data-idx="${idx}">`;
  for (let i = 1; i <= 5; i++) {
    const fill = Math.min(100, Math.max(0, (rating - (i - 1)) * 100)).toFixed(1);
    html += `<span class="star" data-val="${i}" style="--fill:${fill}%;cursor:pointer">★</span>`;
  }
  html += '</div>';
  return html;
}

// ── THUMBNAIL URL TRANSFORM ───────────────────────────────────
// Pinterest CDN: get 236x thumbnail instead of originals/736x (10-50x smaller file & decoded bitmap)
function thumbUrl(url) {
  if (!url) return url;
  if (url.includes('pinimg.com')) {
    return url.replace(/\/(originals|736x|564x|474x|600x|1200x|750x)\//g, '/236x/');
  }
  return url;
}

// ── BATCH IMAGE LOADER + MEMORY MANAGER ──────────────────────
let _mapImagesReady = false;
let _cullerTimer    = null;

function startBatchLoad() {
  const loader = document.getElementById('mapLoader');
  const bar    = document.getElementById('loader-bar');
  const txt    = document.getElementById('loaderText');
  const isMob  = window.innerWidth < 768;
  // Mobile: 2 parallel, 120ms pause — keeps decoded bitmap count low per tick
  // Desktop: 8 parallel, 20ms pause
  const BATCH  = isMob ? 2 : 8;
  const PAUSE  = isMob ? 120 : 20;

  const queue = [];
  mapAllItems.forEach(item => {
    const img = item.el.querySelector('img');
    if (img && img.dataset.src) queue.push(img);
  });

  const total = queue.length;
  if (!total) { finishLoad(loader); return; }

  if (bar) bar.style.width = '0%';
  let done = 0;

  function updProg() {
    const pct = Math.round((done / total) * 100);
    if (bar)  bar.style.width = pct + '%';
    if (txt)  txt.textContent = pct + '%  (' + done + ' / ' + total + ')';
  }

  function loadBatch(i) {
    if (i >= total) { finishLoad(loader); return; }
    const slice = queue.slice(i, i + BATCH);
    let pending = slice.length;
    const next = () => { if (--pending === 0) setTimeout(() => loadBatch(i + BATCH), PAUSE); };
    slice.forEach(img => {
      const src = img.dataset.src;
      if (!src) { done++; updProg(); next(); return; }
      delete img.dataset.src;               // mark as "loading/loaded"
      img.addEventListener('load',  () => { done++; updProg(); next(); }, {once:true});
      img.addEventListener('error', () => { done++; updProg(); next(); }, {once:true});
      img.src = src;
    });
  }
  loadBatch(0);
}

function finishLoad(loader) {
  _mapImagesReady = true;
  const bar = document.getElementById('loader-bar');
  const txt = document.getElementById('loaderText');
  if (bar) bar.style.width = '100%';
  if (txt) txt.textContent = 'Hazır!';
  // Start memory culler on mobile after a short delay
  if (window.innerWidth < 768) {
    setTimeout(startMemoryCuller, 3000);
  }
  setTimeout(() => {
    if (!loader) return;
    loader.classList.add('fade-out');
    setTimeout(() => { loader.style.display = 'none'; loader.classList.remove('fade-out'); }, 520);
  }, 400);
}

// ── MEMORY CULLER (mobile only) ───────────────────────────────
// After loading, periodically evict decoded bitmaps that are far from viewport.
// Brings them back when user pans near them.
function startMemoryCuller() {
  if (_cullerTimer) return;
  _cullerTimer = setInterval(runMemoryCuller, 5000);
}

function runMemoryCuller() {
  if (!mapBuilt) return;
  const VW = window.innerWidth, VH = window.innerHeight;
  const EVICT_DIST = Math.max(VW, VH) * 3;   // world-space px
  const LOAD_DIST  = Math.max(VW, VH) * 1.8;
  mapAllItems.forEach(item => {
    const el = item.el;
    if (el.style.display === 'none') return;
    const img = el.querySelector('img');
    if (!img) return;
    const cx = parseFloat(el.style.left) + (parseFloat(el.style.width)  || 80) / 2;
    const cy = parseFloat(el.style.top)  + (parseFloat(el.style.height) || 100) / 2;
    // screen distance from viewport centre
    const sx = cx * scale + panX - VW / 2;
    const sy = cy * scale + panY - VH / 2;
    const dist = Math.hypot(sx, sy);
    if (dist > EVICT_DIST && img.src && !img.dataset.src) {
      // Evict: store src back in data-src, clear src to free decoded bitmap
      img.dataset.src = img.src;
      img.src = '';
      delete img.dataset.triedOrig; // allow retry on reload
    } else if (dist < LOAD_DIST && !img.src && img.dataset.src) {
      // Reload on approach
      const s = img.dataset.src; delete img.dataset.src; img.src = s;
    }
  });
}

// ── VIEWPORT RELOAD (after pan/zoom — reloads evicted images) ─
function updateMapVisibility() {
  if (!mapBuilt) return;
  const VW = window.innerWidth, VH = window.innerHeight;
  const BUFFER = window.innerWidth < 768 ? 300 : 600;
  mapAllItems.forEach(item => {
    const el = item.el;
    if (el.style.display === 'none') return;
    const img = el.querySelector('img');
    if (!img || !img.dataset.src) return;   // nothing pending
    const curX = parseFloat(el.style.left);
    const curY = parseFloat(el.style.top);
    const iw   = parseFloat(el.style.width)  || 80;
    const ih   = parseFloat(el.style.height) || 100;
    const sx = curX * scale + panX;
    const sy = curY * scale + panY;
    if (sx + iw * scale > -BUFFER && sx < VW + BUFFER &&
        sy + ih * scale > -BUFFER && sy < VH + BUFFER) {
      const s = img.dataset.src; delete img.dataset.src; img.src = s;
    }
  });
}

async function init() {
  try {
    const loaderBar = document.getElementById('loader-bar');
    const loaderText = document.getElementById('loaderText');
    if (loaderBar) loaderBar.style.width = '15%';
    const res = await fetch(GVIZ);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const text = await res.text();
    const json = JSON.parse(text.slice(text.indexOf('(')+1, text.lastIndexOf(')')));
    if (json.status !== 'ok') throw new Error('Sheet unavailable — make sure it is public');

    rows = [];
    const tableRows = json.table.rows || [];
    for (let i = 0; i < tableRows.length; i++) {
      const row = tableRows[i];
      const c = (row.c||[]).map(x => x&&x.v!=null ? String(x.v) : '');
      const imgUrl = (c[1]||'').trim();
      if (!imgUrl) continue;
      rows.push({
        refNo:        (c[0]||'').trim(),
        imgUrl,
        color:        (c[3]||'').trim(),
        pinterestUrl: (c[4]||'').trim(),
        type:         (c[5]||'').trim(),
        description:  (c[6]||'').trim(),
        rating:       parseFloat((c[7]||'').replace(',','.')) || 0,
        note:         (c[8]||'').trim(),
        excelRow:     i + 10
      });
    }

    visibleIdx = rows.map((_,i)=>i);
    if (loaderText) loaderText.textContent = rows.length + ' görsel bulundu, harita kuruluyor...';
    if (loaderBar)  loaderBar.style.width = '10%';
    renderFilters();
    renderMasonry();
    document.body.classList.add('has-data');
    setStatus('ready', `${rows.length} images`);
    buildMap(); // startBatchLoad() is called inside buildMap, handles 0→100%
  } catch(e) {
    setStatus('error','Failed to load');
    const ml = document.getElementById('mapLoader');
    ml.innerHTML =
      `<div style="text-align:center;padding:40px 20px">
        <p style="color:var(--burgundy);font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.08em;margin-bottom:12px">Hata: ${e.message}</p>
        <p style="font-family:'IBM Plex Mono',monospace;font-size:10px;color:rgba(176,168,144,.4);letter-spacing:.06em">Google Sheet "Herkese açık" ayarında olmalı.<br><br><button onclick="location.reload()" style="background:var(--copper);border:none;color:var(--black);font-family:'IBM Plex Mono',monospace;font-size:10px;padding:8px 18px;cursor:pointer;letter-spacing:.1em">Yeniden Dene</button></p>
      </div>`;
  }
}

function mkChip(label,f,active) {
  const c=document.createElement('button');
  c.className='filter-chip'+(active?' active':'');
  c.textContent=label; c.dataset.f=f; return c;
}

function applyFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.filter-chip').forEach(c=>c.classList.toggle('active',c.dataset.f===f));
  document.querySelectorAll('.card').forEach(card=>{
    const idx = +card.dataset.idx;
    const typeOk = f==='all' || rows[idx].type===f;
    const starOk = selectedStars.size===0 || selectedStars.has(Math.round(rows[idx].rating));
    card.classList.toggle('hidden', !typeOk || !starOk);
  });
  visibleIdx = rows.map((_,i)=>i).filter(i=>{
    const typeOk = f==='all' || rows[i].type===f;
    const starOk = selectedStars.size===0 || selectedStars.has(Math.round(rows[i].rating));
    return typeOk && starOk;
  });
  // show/hide bölüm açıklama button
  const wrap = document.getElementById('bolumAciklamaWrap');
  if (f !== 'all') {
    const section = findDocForType(f);
    wrap.style.display = section ? '' : 'none';
    if (section) wrap.dataset.key = section.key;
  } else {
    wrap.style.display = 'none';
  }
}

function applyTransform() {
  document.getElementById('mapStage').style.transform = `translate(${panX}px,${panY}px) scale(${scale})`;

function buildMap() {
  const stage = document.getElementById('mapStage');
  stage.innerHTML = '';
  mapAllItems = [];
  isShuffled = false;
  document.getElementById('mapShuffleBtn').classList.remove('active');

  const VW=window.innerWidth, VH=window.innerHeight;
  const isMobile = VW < 768;
  let seed=137;
  const rng=()=>{ seed=(seed*1664525+1013904223)>>>0; return seed/0xffffffff; };

  const types=[...new Set(rows.map(r=>r.type).filter(Boolean))];
  const ungrouped=rows.filter(r=>!r.type);
  const WORLD_W = isMobile ? 1800 : 4200;
  const WORLD_H = isMobile ? Math.max(Math.ceil((types.length||1)/2) * 520, 1800) : 3200;
  const cols = isMobile ? 2 : Math.ceil(Math.sqrt(types.length||1));
  const rcount=Math.ceil((types.length||1)/cols);
  const cellW=WORLD_W/cols, cellH=WORLD_H/rcount;

  const centers=types.map((_,i)=>({
    x: cellW*(i%cols+0.5)+(rng()-.5)*cellW*.06,
    y: cellH*(Math.floor(i/cols)+0.5)+(rng()-.5)*cellH*.06
  }));

  const allItems=[];

  function placeCluster(group, cx, cy) {
    const placedRects=[];
    const n=group.length;
    const baseR=Math.min(cellW,cellH)*(isMobile?0.40:0.46);
    const circR=Math.min(baseR*Math.sqrt(Math.max(1,n/8)), Math.min(cellW,cellH)*0.49);

    // Label dead-zone (cluster title area)
    const LW=isMobile?200:380, LH=isMobile?90:150;
    const LX=cx-LW/2, LY=cy-LH-30;

    // ── Sunflower / Phyllotaxis spiral slots ──────────────────
    // sqrt(frac) gives uniform-area density → no center clustering
    // Shuffled → random look. Jitter → organic feel.
    const GOLDEN=Math.PI*(3-Math.sqrt(5)); // ≈ 2.3998 rad
    const slots=[];
    for(let i=0;i<n;i++){
      slots.push({ r: circR*0.87*Math.sqrt((i+0.5)/n), a: i*GOLDEN });
    }
    // Fisher-Yates shuffle
    for(let i=slots.length-1;i>0;i--){
      const j=Math.floor(rng()*(i+1));
      const tmp=slots[i]; slots[i]=slots[j]; slots[j]=tmp;
    }

    group.forEach((row,j)=>{
      const gi=rows.indexOf(row);
      const sr=rng();
      const w=isMobile?(sr<.12?56:sr<.38?40:28):(sr<.12?120:sr<.38?85:58);
      const h=isMobile?(sr<.12?75:sr<.38?53:37):(sr<.12?160:sr<.38?112:77);
      const maxR=Math.max(0,circR-Math.max(w,h)*0.55);

      const slot=slots[j%slots.length];
      // Small jitter — organic without losing even spread
      const jR=(rng()-.5)*circR*0.07;
      const jA=(rng()-.5)*0.28;
      const r=Math.max(circR*0.08, Math.min(slot.r+jR, maxR));
      const a=slot.a+jA;
      let ix=cx+Math.cos(a)*r-w/2;
      let iy=cy+Math.sin(a)*r-h/2;

      // Push out of label dead-zone (deflect angle)
      if(ix<LX+LW&&ix+w>LX&&iy<LY+LH&&iy+h>LY){
        const pa=a+Math.PI*(0.35+rng()*0.3);
        const pr=Math.min(Math.max(r, circR*0.35), maxR);
        ix=cx+Math.cos(pa)*pr-w/2;
        iy=cy+Math.sin(pa)*pr-h/2;
        // clamp to circle
        const d=Math.hypot(ix+w/2-cx,iy+h/2-cy);
        if(d>maxR){const sc=maxR/d;ix=cx+(ix+w/2-cx)*sc-w/2;iy=cy+(iy+h/2-cy)*sc-h/2;}
      }

      // Resolve >30% overlap: push away from conflicting rects
      const MAX_OV=Math.floor(Math.min(w,h)*0.30);
      for(let att=0;att<16;att++){
        const conf=placedRects.find(r=>
          ix<r.x+r.w-MAX_OV&&ix+w-MAX_OV>r.x&&iy<r.y+r.h-MAX_OV&&iy+h-MAX_OV>r.y
        );
        if(!conf) break;
        const da=Math.atan2(iy+h/2-(conf.y+conf.h/2), ix+w/2-(conf.x+conf.w/2));
        const nudge=Math.max(w,h)*0.38;
        ix+=Math.cos(da)*nudge; iy+=Math.sin(da)*nudge;
        // keep in circle
        const d=Math.hypot(ix+w/2-cx,iy+h/2-cy);
        if(d>maxR){const sc=maxR/d;ix=cx+(ix+w/2-cx)*sc-w/2;iy=cy+(iy+h/2-cy)*sc-h/2;}
      }

      placedRects.push({x:ix,y:iy,w,h});
      const rot=(rng()-.5)*6;

      const island=document.createElement('div');
      island.className='map-island';
      island.style.cssText=`left:${ix}px;top:${iy}px;width:${w}px;height:${h}px;transform:rotate(${rot}deg)`;
      island.dataset.baseRot=rot; island.dataset.currentRot=rot; island.dataset.idx=gi;

      const inner=document.createElement('div'); inner.className='map-island-inner';
      const img=document.createElement('img');
      img.dataset.src=thumbUrl(row.imgUrl); img.dataset.origSrc=row.imgUrl; img.referrerPolicy='no-referrer'; img.alt=''; img.draggable=false; img.decoding='async';
      // placeholder colour while loading
      inner.style.background=row.color||'var(--dim)';
      img.onerror=()=>{
        // thumb failed → try original URL once; if that also fails, hide
        if (!img.dataset.triedOrig && img.dataset.origSrc && img.src !== img.dataset.origSrc) {
          img.dataset.triedOrig='1'; img.src=img.dataset.origSrc;
        } else { inner.style.background=row.color||'var(--dim)'; img.style.display='none'; }
      };
      inner.appendChild(img);
      const bottomBar=document.createElement('div'); bottomBar.className='map-island-bottom';
      const starsWrap=document.createElement('div'); starsWrap.className='map-stars';
      starsWrap.innerHTML=buildStarRating(row.rating);
      bottomBar.appendChild(starsWrap);
      const hl=document.createElement('div'); hl.className='map-island-hlabel'; hl.textContent=row.type||'';
      bottomBar.appendChild(hl);
      inner.appendChild(bottomBar);
      island.appendChild(inner);
      // Star badge: top-left, visible when body.show-notes (Edetri Yorum)
      if (row.rating) { const badge=document.createElement('div'); badge.className='island-star-badge'; badge.textContent=row.rating+'★'; island.appendChild(badge); }
      // Comment overlay (shown when body.show-desc or body.show-notes)
      const cmtWrap=document.createElement('div'); cmtWrap.className='map-island-comments';
      if (row.description) { const d=document.createElement('div'); d.className='card-desc'; d.textContent=row.description; cmtWrap.appendChild(d); }
      const nd=document.createElement('div'); nd.className='card-note-display'; nd.textContent=row.note||''; if(!row.note) nd.style.display='none'; cmtWrap.appendChild(nd);
      island.appendChild(cmtWrap);

      if (!isMobile) {
        // Desktop: drag to reposition, click (no move) to open modal
        let dragging=false, hasMoved=false, dsx, dsy, dsl, dst;
        island.addEventListener('pointerdown', e=>{
          e.stopPropagation();
          dragging=true; hasMoved=false;
          dsx=e.clientX; dsy=e.clientY;
          dsl=parseFloat(island.style.left); dst=parseFloat(island.style.top);
          island.style.transition='none'; island.style.zIndex='1500';
          island.setPointerCapture(e.pointerId);
        });
        island.addEventListener('pointermove', e=>{
          if (!dragging) return;
          const dx=(e.clientX-dsx)/scale, dy=(e.clientY-dsy)/scale;
          if (Math.abs(dx)>3||Math.abs(dy)>3) hasMoved=true;
          if (!hasMoved) return;
          document.getElementById('mapTooltip').classList.remove('visible');
          island.style.left=(dsl+dx)+'px'; island.style.top=(dst+dy)+'px';
        });
        island.addEventListener('pointerup', ()=>{
          if (!dragging) return;
          dragging=false; island.style.zIndex=''; island.style.transition='';
          if (!hasMoved) {
            openMapImagePanel(gi);
          } else {
            const item=mapAllItems.find(x=>x.el===island);
            if (item){ item.baseX=parseFloat(island.style.left); item.baseY=parseFloat(island.style.top); }
          }
        });
        island.addEventListener('pointercancel', ()=>{
          dragging=false; island.style.zIndex=''; island.style.transition='';
        });
        // hover: +10deg rotation + tooltip
        island.addEventListener('mouseenter', ()=>{
          const r=parseFloat(island.dataset.currentRot);
          island.style.transform=`rotate(${r+10}deg)`;
          const ttEl=document.getElementById('ttType');
          ttEl.textContent=row.type||'';
          if (row.refNo) { const rs=document.createElement('span'); rs.className='tt-ref'; rs.textContent=' ('+row.refNo+')'; ttEl.appendChild(rs); }
          document.getElementById('ttDesc').textContent=row.description||'';
          if (row.type||row.description) document.getElementById('mapTooltip').classList.add('visible');
        });
        island.addEventListener('mouseleave', ()=>{
          const r=parseFloat(island.dataset.currentRot);
          island.style.transform=`rotate(${r}deg)`;
          document.getElementById('mapTooltip').classList.remove('visible');
        });
      } else {
        // Mobile: tap to open panel — only fire if no pan/pinch occurred
        let _tapStart = null;
        island.addEventListener('touchstart', e => {
          if (e.touches.length === 1) _tapStart = {x: e.touches[0].clientX, y: e.touches[0].clientY};
          else _tapStart = null;
        }, {passive:true});
        island.addEventListener('touchend', e => {
          if (!_tapStart) return;
          const dx = e.changedTouches[0].clientX - _tapStart.x;
          const dy = e.changedTouches[0].clientY - _tapStart.y;
          if (Math.hypot(dx,dy) < 10) { e.preventDefault(); openMapImagePanel(gi); }
          _tapStart = null;
        });
      }

      stage.appendChild(island);
      allItems.push({el:island, baseX:ix, baseY:iy, baseRot:rot});
    });
  }

  types.forEach((t,i)=>placeCluster(rows.filter(r=>r.type===t), centers[i].x, centers[i].y));
  if (ungrouped.length) placeCluster(ungrouped, WORLD_W/2, WORLD_H*.88);

  mapAllItems=allItems;

  // cluster labels (z-index 500)
  types.forEach((t,i)=>{
    const lbl=document.createElement('div'); lbl.className='map-cluster-label';
    lbl.style.left=centers[i].x+'px'; lbl.style.top=(centers[i].y-75)+'px';
    const nm=document.createElement('div'); nm.className='map-cluster-name'; nm.textContent=t;
    const cnt=document.createElement('div'); cnt.className='map-cluster-count';
    cnt.textContent=`${rows.filter(r=>r.type===t).length} items`;
    lbl.appendChild(nm); lbl.appendChild(cnt);
    const sec=findDocForType(t);
    if (sec) {
      const ab=document.createElement('div'); ab.className='map-cluster-aciklama-btn'; ab.textContent='+açıklama+';
      ab.addEventListener('click',e=>{e.stopPropagation();openClusterPanel(sec.key,ab);});
      lbl.appendChild(ab);
    }
    stage.appendChild(lbl);
  });

  // fit to screen — use approximate sizes since DOM not yet painted
  const W_EST=80, H_EST=100, PAD=80;
  const minX=Math.min(...allItems.map(x=>x.baseX))-PAD;
  const minY=Math.min(...allItems.map(x=>x.baseY))-PAD;
  const maxX=Math.max(...allItems.map(x=>x.baseX+W_EST))+PAD;
  const maxY=Math.max(...allItems.map(x=>x.baseY+H_EST))+PAD;
  if (isMobile) {
    // Mobile: fit world width to screen, start scrolled to top
    scale = Math.min(VW / WORLD_W * 0.92, 0.7);
    panX = (VW - WORLD_W * scale) / 2;
    panY = 60;
  } else {
    scale=Math.min(VW/(maxX-minX), VH/(maxY-minY), 1);
    panX=(VW-(maxX-minX)*scale)/2 - minX*scale;
    panY=(VH-(maxY-minY)*scale)/2 - minY*scale;
  }
  applyTransform();

  document.querySelector('.map-hint-label').textContent = isMobile
    ? 'tap to open · drag to pan · pinch to zoom'
    : 'scroll to zoom · drag canvas to pan · drag image to move · click to open';

  mapBuilt=true;
  applyStarFilterToMap();
  // Batch-load all images, keep loader visible until 100% done
  startBatchLoad();

  const view=document.getElementById('mapView');

  if (isMobile) {
    // Mobile: multi-pointer pan + pinch zoom; islands don't block pan
    const activePtrs = new Map();
    let pinchState = null;
    view.addEventListener('pointerdown', e=>{
      if (e.target.closest('.map-ui-btn')||e.target.closest('.cluster-panel')||e.target.closest('.map-cluster-aciklama-btn')) return;
      e.preventDefault();
      view.setPointerCapture(e.pointerId);
      view.classList.add('panning');
      activePtrs.set(e.pointerId, {x:e.clientX, y:e.clientY});
      if (activePtrs.size === 2) {
        isPanning = false;
        const pts=[...activePtrs.values()];
        pinchState={
          dist: Math.hypot(pts[1].x-pts[0].x, pts[1].y-pts[0].y),
          midX: (pts[0].x+pts[1].x)/2, midY: (pts[0].y+pts[1].y)/2,
          scale, panX, panY
        };
      } else if (activePtrs.size === 1) {
        isPanning=true; panSX=e.clientX; panSY=e.clientY; panOX=panX; panOY=panY;
      }
    }, {passive:false});
    let _rafId=null, _visRafId=null;
    const scheduleVisibility=()=>{ if(_visRafId) return; _visRafId=requestAnimationFrame(()=>{ _visRafId=null; updateMapVisibility(); }); };
    const scheduleTransform=()=>{ if(_rafId) return; _rafId=requestAnimationFrame(()=>{ _rafId=null; applyTransform(); scheduleVisibility(); }); };
    view.addEventListener('pointermove', e=>{
      if (!activePtrs.has(e.pointerId)) return;
      e.preventDefault();
      activePtrs.set(e.pointerId, {x:e.clientX, y:e.clientY});
      if (pinchState && activePtrs.size >= 2) {
        const pts=[...activePtrs.values()];
        const curDist=Math.hypot(pts[1].x-pts[0].x, pts[1].y-pts[0].y);
        const ns=Math.min(Math.max(pinchState.scale*(curDist/pinchState.dist), 0.05), 5);
        panX=pinchState.midX-(pinchState.midX-pinchState.panX)*(ns/pinchState.scale);
        panY=pinchState.midY-(pinchState.midY-pinchState.panY)*(ns/pinchState.scale);
        scale=ns; scheduleTransform();
      } else if (isPanning) {
        panX=panOX+(e.clientX-panSX); panY=panOY+(e.clientY-panSY); scheduleTransform();
      }
    }, {passive:false});
    const releaseMobile=e=>{
      activePtrs.delete(e.pointerId);
      if (activePtrs.size < 2) pinchState=null;
      if (activePtrs.size === 0) { isPanning=false; view.classList.remove('panning'); }
    };
    view.addEventListener('pointerup', releaseMobile);
    view.addEventListener('pointercancel', releaseMobile);
  } else {
    // Desktop: pan with pointer capture (skips islands), scroll to zoom
    view.addEventListener('pointerdown', e=>{
      if (e.target.closest('.map-island')||e.target.closest('.map-ui-btn')||e.target.closest('.cluster-panel')||e.target.closest('.map-cluster-aciklama-btn')) return;
      isPanning=true; panSX=e.clientX; panSY=e.clientY; panOX=panX; panOY=panY;
      view.setPointerCapture(e.pointerId);
      view.style.cursor='grabbing';
    });
    let _deskVisTimer=null;
    const scheduleDesktopVisibility=()=>{ clearTimeout(_deskVisTimer); _deskVisTimer=setTimeout(updateMapVisibility,60); };
    view.addEventListener('pointermove', e=>{
      if (!isPanning) return;
      panX=panOX+(e.clientX-panSX); panY=panOY+(e.clientY-panSY); applyTransform(); scheduleDesktopVisibility();
    });
    view.addEventListener('pointerup', ()=>{ isPanning=false; view.style.cursor=''; updateMapVisibility(); });
    view.addEventListener('pointercancel', ()=>{ isPanning=false; view.style.cursor=''; });
    view.addEventListener('wheel', e=>{
      if (e.target.closest('.cluster-panel')) return;
      e.preventDefault();
      const f=e.deltaY>0?.92:1.08;
      const ns=Math.min(Math.max(scale*f,.1),5);
      const rect=view.getBoundingClientRect();
      const mx=e.clientX-rect.left, my=e.clientY-rect.top;
      panX=mx-(mx-panX)*(ns/scale); panY=my-(my-panY)*(ns/scale);
      scale=ns; applyTransform(); scheduleDesktopVisibility();
    },{passive:false});
  }
}

function openMap() {
  // Flush any focused input/button so iOS doesn't carry keyboard into pano mode
  const ae = document.activeElement;
  if (ae && ae !== document.body) ae.blur();
  if (window.getSelection) window.getSelection().removeAllRanges();
  closeMobileNav();
  document.getElementById('galleryWrap').style.display='none';
  document.getElementById('mapView').style.display='block';
  document.getElementById('sizeSliderWrap').style.display='none';
  document.body.classList.remove('gallery-mode');
  // Clear comment toggle states when entering PANO mode
  document.body.classList.remove('show-desc','show-notes');
  const ct=document.getElementById('commentToggle'); if(ct) ct.checked=false;
  const et=document.getElementById('edetriToggle'); if(et) et.checked=false;
  document.body.style.overflow='hidden';
  const firstBuild = !mapBuilt;
  if (!mapBuilt && rows.length) {
    const loader=document.getElementById('mapLoader');
    loader.style.display='flex'; loader.style.opacity='1'; loader.classList.remove('fade-out');
    _mapImagesReady=false;
    buildMap();
  } else if (mapBuilt && !_mapImagesReady) {
    // still loading — loader already visible, nothing to do
  }
  if (firstBuild && window.innerWidth < 768) requestAnimationFrame(fitMap);
  // Resume memory culler on mobile if images are already loaded
  if (window.innerWidth < 768 && _mapImagesReady && !_cullerTimer) startMemoryCuller();
  const tb = document.getElementById('modeToggleBtn');
  if (tb) tb.textContent = 'Duvar';
}

function closeMap() {
  // Pause memory culler while in gallery mode
  if (_cullerTimer) { clearInterval(_cullerTimer); _cullerTimer = null; }
  document.getElementById('mapView').style.display='none';
  document.getElementById('galleryWrap').style.display='';
  document.getElementById('sizeSliderWrap').style.display='flex';
  document.body.classList.add('gallery-mode');
  document.body.classList.remove('header-hidden');
  document.body.style.overflow='';
  const tb = document.getElementById('modeToggleBtn');
  if (tb) tb.textContent = '⊕ Pano';
  // Mobilde masonry 2 sütun default
  if (window.innerWidth < 768) {
    _cols = 2;
    const sd = document.getElementById('sizeDisplay');
    if (sd) sd.textContent = 2;
    applySize(2);
  }
  requestAnimationFrame(updateGalleryPadding);
}

function handleModeToggle() {
  if (document.body.classList.contains('gallery-mode')) openMap();
  else closeMap();
}

function toggleShuffle() {
  isShuffled=!isShuffled;
  document.getElementById('mapShuffleBtn').classList.toggle('active',isShuffled);
  isShuffled ? doShuffle() : returnCluster();
}

function doShuffle() {
  let s=Date.now();
  const rr=()=>{ s=(s*1664525+1013904223)>>>0; return s/0xffffffff; };
  const VW=window.innerWidth/scale, VH=window.innerHeight/scale;
  const offX=-panX/scale, offY=-panY/scale;
  mapAllItems.forEach(item=>{
    const PAD=20;
    const w=parseInt(item.el.style.width)||80, h=parseInt(item.el.style.height)||100;
    const tx=offX+PAD+rr()*(VW-w-PAD*2);
    const ty=offY+PAD+rr()*(VH-h-PAD*2);
    const rot=(rr()-.5)*22;
    item.el.style.transition='left .7s cubic-bezier(.34,1.56,.64,1),top .7s cubic-bezier(.34,1.56,.64,1),transform .7s ease';
    item.el.style.left=tx+'px'; item.el.style.top=ty+'px';
    item.el.style.transform=`rotate(${rot}deg)`;
    item.el.dataset.currentRot=rot;
    item.shuffleX=tx; item.shuffleY=ty;
  });
  document.querySelectorAll('.map-cluster-label').forEach(l=>{l.style.transition='opacity .3s';l.style.opacity='0';});
}

function returnCluster() {
  mapAllItems.forEach(item=>{
    item.el.style.transition='left .6s cubic-bezier(.25,.46,.45,.94),top .6s cubic-bezier(.25,.46,.45,.94),transform .6s ease';
    item.el.style.left=item.baseX+'px'; item.el.style.top=item.baseY+'px';
    item.el.style.transform=`rotate(${item.baseRot}deg)`;
    item.el.dataset.currentRot=item.baseRot;
  });
  document.querySelectorAll('.map-cluster-label').forEach(l=>{l.style.transition='opacity .4s .3s';l.style.opacity='1';});
}

document.addEventListener('keydown', e=>{

  const m=document.getElementById('modal');
  if (m.classList.contains('open')){
    if (e.key==='Escape') closeModal();
    if (e.key==='ArrowLeft') navModal(-1);
    if (e.key==='ArrowRight') navModal(1);
  } else {
    if (e.key==='Escape') { closeRapor(); closeYaklasim(); }
  }
});

// Modal swipe navigation (mobile)
(function(){
  const m = document.getElementById('modal');
  let sx = 0, sy = 0;
  m.addEventListener('touchstart', e => {
    if (e.touches.length !== 1) return;
    sx = e.touches[0].clientX;
    sy = e.touches[0].clientY;
  }, {passive:true});
  m.addEventListener('touchend', e => {
    if (!m.classList.contains('open')) return;
    const dx = e.changedTouches[0].clientX - sx;
    const dy = e.changedTouches[0].clientY - sy;
    if (Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy) * 1.5) {
      e.preventDefault();
      navModal(dx < 0 ? 1 : -1);
    }
  }, {passive:false});
})();

// ── RAPOR (tabbed) ─────────────────────────────────────────────
let raporLoadedTabs = {};
function openRapor(initialKey) {
  document.getElementById('raporOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
  buildRaporTabs();
  switchRaporTab(initialKey || SECTION_DOCS[0].key);
}
function buildRaporTabs() {
  const bar = document.getElementById('raporTabs');
  if (bar.children.length) return;
  SECTION_DOCS.forEach(s => {
    const btn = document.createElement('button');
    btn.className = 'rapor-tab';
    btn.textContent = s.label;
    btn.dataset.key = s.key;
    btn.onclick = () => switchRaporTab(s.key);
    bar.appendChild(btn);
  });
}
function switchRaporTab(key) {
  document.querySelectorAll('.rapor-tab').forEach(b => b.classList.toggle('active', b.dataset.key === key));
  const content = document.getElementById('raporContent');
  if (raporLoadedTabs[key]) { content.innerHTML = raporLoadedTabs[key]; return; }
  content.innerHTML = '<div id="raporLoading">Yükleniyor...</div>';

    setupPanelResize(panel);

    document.getElementById('mapView').appendChild(panel);

  }
  const panel = clusterPanelCache[KEY];
  if (panel.style.display !== 'none') { panel.style.zIndex = nextPanelZ(); return; }
  const mob = window.innerWidth < 768;
  if (mob) {
    const pw = Math.round(window.innerWidth  * 0.88);
    const ph = Math.round(window.innerHeight * 0.78);
    panel.style.width  = pw + 'px';
    panel.style.height = ph + 'px';
    panel.style.left   = Math.round((window.innerWidth  - pw) / 2) + 'px';
    panel.style.top    = Math.round((window.innerHeight - ph) / 2) + 'px';
  } else {
    const r = anchorEl ? anchorEl.getBoundingClientRect() : null;
    panel.style.left = (r ? Math.min(r.right + 10, window.innerWidth - 420) : 80) + 'px';

// ── MAP IMAGE PANELS (per-image floating popup, multi-instance) ──
const mapImagePanelCache = {};
function openMapImagePanel(gi) {
  if (!mapImagePanelCache[gi]) {
    mapImagePanelCache[gi] = _createMapImagePanel(gi);
    document.getElementById('mapView').appendChild(mapImagePanelCache[gi]);
  }
  const panel = mapImagePanelCache[gi];
  if (panel.style.display !== 'none') { panel.style.zIndex = nextPanelZ(); return; }
  const mob = window.innerWidth < 768;
  const count = Object.keys(mapImagePanelCache).length - 1;
  const w = mob ? Math.round(window.innerWidth  * 0.88) : Math.min(480, window.innerWidth  - 20);
  const h = mob ? Math.round(window.innerHeight * 0.78) : Math.min(576, window.innerHeight - 40);
  // Mobilde her zaman ekran merkezine — canvas zoom'undan bağımsız
  const ox = mob ? 0 : (count % 6) * 22;
  const oy = mob ? 0 : (count % 6) * 18;
  panel.style.width  = w + 'px';
  panel.style.height = h + 'px';
  panel.style.left   = Math.max(10, (window.innerWidth  - w) / 2 + ox) + 'px';
  panel.style.top    = Math.max(10, (window.innerHeight - h) / 2 + oy) + 'px';
  panel.style.display = 'flex';
  panel.style.zIndex = nextPanelZ();
}
function _createMapImagePanel(gi) {
  const row = rows[gi];
  const panel = document.createElement('div');
  panel.className = 'cluster-panel map-image-panel';
  panel.style.display = 'none';
  panel.innerHTML =
    '<div class="cp-titlebar"><span class="cp-title">' + (row.type||'') + (row.refNo?' <span class="cp-ref">('+row.refNo+')</span>':'') + '</span><button class="cp-close">✕</button></div>' +
    '<div class="mip-img-wrap"><img class="mip-img" src="' + (row.imgUrl||'') + '" alt="" referrerpolicy="no-referrer"></div>' +
    '<div class="mip-info"><div class="mip-desc">' + (row.description||'') + '</div><div class="mip-stars">' + buildInteractiveStarRating(gi, row.rating||0) + '</div><div class="mip-note-slot"></div></div>' +
    '<div class="cp-resize cp-resize-n"></div><div class="cp-resize cp-resize-ne"></div>' +
    '<div class="cp-resize cp-resize-e"></div><div class="cp-resize cp-resize-se"></div>' +
    '<div class="cp-resize cp-resize-s"></div><div class="cp-resize cp-resize-sw"></div>' +
    '<div class="cp-resize cp-resize-w"></div><div class="cp-resize cp-resize-nw"></div>';
  panel.querySelector('.cp-close').onclick = () => {
    panel.style.display = 'none';
    if (panel._starsObserver) { panel._starsObserver.disconnect(); delete panel._starsObserver; }
  };
  panel.addEventListener('pointerdown', e => { e.stopPropagation(); panel.style.zIndex = nextPanelZ(); });
  setupPanelDrag(panel);
  setupPanelResize(panel);
  initMipPanelStars(panel, gi);
  const noteSlot = panel.querySelector('.mip-note-slot');
  if (noteSlot) noteSlot.appendChild(makeNoteInput(gi, 'textarea', 'mip-note'));
  return panel;
}

function initMipPanelStars(panel, gi) {
  const mipStars = panel.querySelector('.mip-stars');
  if (!mipStars) return;
  const container = mipStars.querySelector('.star-interactive');
  if (!container) return;
  const stars = [...container.querySelectorAll('.star')];
  stars.forEach(star => {
    const val = parseInt(star.dataset.val);
    star.addEventListener('mouseenter', () => {
      stars.forEach(s => s.style.setProperty('--fill', parseInt(s.dataset.val) <= val ? '100%' : '0%'));
    });
    star.addEventListener('mouseleave', () => {
      stars.forEach(s => {
        const f = Math.min(100, Math.max(0, (rows[gi].rating - (parseInt(s.dataset.val) - 1)) * 100));
        s.style.setProperty('--fill', f + '%');
      });
    });
    star.addEventListener('click', async () => {
      rows[gi].rating = val;
      mipStars.innerHTML = buildInteractiveStarRating(gi, val);
      initMipPanelStars(panel, gi);
      try {
        await fetch(APPS_SCRIPT_URL, {
          method: 'POST',
          headers: {'Content-Type': 'text/plain;charset=utf-8'},
          body: JSON.stringify({row: rows[gi].excelRow, type: rows[gi].type, description: rows[gi].description, rating: val})
        });
      } catch(e) { showToast && showToast('Kaydetme başarısız'); }
    });
  });
}

// ── CLUSTER PANELS (per-cluster floating docx windows) ─────────
const clusterPanelCache = {};
let _panelZ = 1100;
function nextPanelZ(){ return ++_panelZ; }

function openClusterPanel(key, anchorEl) {
  if (!clusterPanelCache[key]) {
    clusterPanelCache[key] = createClusterPanel(key);
    document.getElementById('mapView').appendChild(clusterPanelCache[key]);
  }
  const panel = clusterPanelCache[key];
  if (panel.style.display !== 'none') { panel.style.zIndex = nextPanelZ(); return; }
  const mob = window.innerWidth < 768;
  if (mob) {
    const pw = Math.round(window.innerWidth  * 0.88);
    const ph = Math.round(window.innerHeight * 0.78);
    panel.style.width  = pw + 'px';
    panel.style.height = ph + 'px';
    panel.style.left   = Math.round((window.innerWidth  - pw) / 2) + 'px';
    panel.style.top    = Math.round((window.innerHeight - ph) / 2) + 'px';
  } else {
    const r = anchorEl.getBoundingClientRect();
    panel.style.left = Math.max(0, Math.min(r.left + 20, window.innerWidth - 420)) + 'px';
    panel.style.top  = Math.max(0, Math.min(r.bottom + 10, window.innerHeight - 500)) + 'px';
  }
  panel.style.display = 'flex';
  panel.style.zIndex = nextPanelZ();
  loadClusterPanel(key, panel);
}

function createClusterPanel(key) {
  const sec = SECTION_DOCS.find(s => s.key === key);
  const panel = document.createElement('div');
  panel.className = 'cluster-panel';
  panel.dataset.key = key;
  panel.style.display = 'none';
  panel.innerHTML =
    '<div class="cp-titlebar">' +
      '<span class="cp-title">' + (sec ? sec.label : key) + '</span>' +
      '<button class="cp-close">✕</button>' +
    '</div>' +
    '<div class="cp-content doc-content"></div>' +
    '<div class="cp-resize cp-resize-n"></div>' +
    '<div class="cp-resize cp-resize-ne"></div>' +
    '<div class="cp-resize cp-resize-e"></div>' +
    '<div class="cp-resize cp-resize-se"></div>' +
    '<div class="cp-resize cp-resize-s"></div>' +
    '<div class="cp-resize cp-resize-sw"></div>' +
    '<div class="cp-resize cp-resize-w"></div>' +
    '<div class="cp-resize cp-resize-nw"></div>';
  panel.querySelector('.cp-close').onclick = () => { panel.style.display = 'none'; };
  panel.addEventListener('pointerdown', e => { e.stopPropagation(); panel.style.zIndex = nextPanelZ(); });
  setupPanelDrag(panel);
  setupPanelResize(panel);
  return panel;
}

function loadClusterPanel(key, panel) {
  const content = panel.querySelector('.cp-content');
  if (content.dataset.loaded) return;
  if (raporLoadedTabs[key]) { content.innerHTML = raporLoadedTabs[key]; content.dataset.loaded = '1'; return; }
  content.innerHTML = '<div style="color:var(--silver);font-family:\'IBM Plex Mono\',monospace;font-size:10px;letter-spacing:.1em;padding:20px 0">Yükleniyor...</div>';
  if (key === 'EDETRI_Bolum2_AnaCerceve') {
    fetch(RAPOR_BASE + 'rapor_anacerceve.txt')
      .then(r => r.text())
      .then(txt => { const html=txtToHtml(txt); raporLoadedTabs[key]=html; content.innerHTML=html; content.dataset.loaded='1'; })
      .catch(() => { content.innerHTML = '<p style="color:var(--copper);padding:20px 0">Dosya yüklenemedi.</p>'; });
  } else {
    fetch(RAPOR_BASE + key + '.txt')
      .then(r => r.text())
      .then(txt => { const html = txtToHtml(txt); raporLoadedTabs[key] = html; content.innerHTML = html; content.dataset.loaded = '1'; })
      .catch(() => { content.innerHTML = '<p style="color:var(--copper);padding:20px 0">Dosya yüklenemedi.</p>'; });
  }
}

function setupPanelDrag(panel) {
  const tb = panel.querySelector('.cp-titlebar');
  let dx, dy;
  tb.addEventListener('pointerdown', e => {
    if (e.target.classList.contains('cp-close')) return;
    e.stopPropagation();
    const r = panel.getBoundingClientRect();
    dx = e.clientX - r.left; dy = e.clientY - r.top;
    tb.style.cursor = 'grabbing';
    tb.setPointerCapture(e.pointerId);
  });
  tb.addEventListener('pointermove', e => {
    if (!tb.hasPointerCapture(e.pointerId)) return;
    panel.style.left = (e.clientX - dx) + 'px';
    panel.style.top  = (e.clientY - dy) + 'px';
  });
  tb.addEventListener('lostpointercapture', () => { tb.style.cursor = 'grab'; });
}

function setupPanelResize(panel) {
  panel.querySelectorAll('.cp-resize').forEach(handle => {
    const dir = handle.className.replace(/.*cp-resize-/,'');
    let sw, sh, sx, sy, sl, st;
    handle.addEventListener('pointerdown', e => {
      e.stopPropagation();
      e.preventDefault();
      handle.setPointerCapture(e.pointerId);
      const r = panel.getBoundingClientRect();
      sw=r.width; sh=r.height; sx=e.clientX; sy=e.clientY; sl=r.left; st=r.top;
    });
    handle.addEventListener('pointermove', e => {
      if (!handle.hasPointerCapture(e.pointerId)) return;
      const dx=e.clientX-sx, dy=e.clientY-sy, MW=240, MH=160;
      if (dir.includes('e')) panel.style.width  = Math.max(MW, sw+dx) + 'px';
      if (dir.includes('s')) panel.style.height = Math.max(MH, sh+dy) + 'px';
      if (dir.includes('w')) { const nw=Math.max(MW,sw-dx); panel.style.width=nw+'px'; panel.style.left=(sl+sw-nw)+'px'; }
      if (dir.includes('n')) { const nh=Math.max(MH,sh-dy); panel.style.height=nh+'px'; panel.style.top=(st+sh-nh)+'px'; }
    });
  });
}

document.addEventListener('keydown',e=>{ if(e.key==='Escape'){closeRapor();closeYaklasim();} });

// ── STAR FILTER ────────────────────────────────────────────────
function applyStarFilterToMap() {
  if (!mapBuilt) return;
  document.querySelectorAll('.map-island').forEach(island => {
    const gi = +island.dataset.idx;
    if (isNaN(gi)) return;
    const starOk = selectedStars.size === 0 || selectedStars.has(Math.round(rows[gi].rating));
    island.style.display = starOk ? '' : 'none';
  });
}

function fitMap() {
  if (!mapAllItems.length) return;
  const PAD = 80;
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  mapAllItems.forEach(item => {
    const x = parseFloat(item.el.style.left);
    const y = parseFloat(item.el.style.top);
    const w = parseFloat(item.el.style.width) || 80;
    const h = parseFloat(item.el.style.height) || 100;
    minX = Math.min(minX, x); minY = Math.min(minY, y);
    maxX = Math.max(maxX, x + w); maxY = Math.max(maxY, y + h);
  });
  const VW = window.innerWidth, VH = window.innerHeight;
  const contentW = maxX - minX + PAD * 2;
  const contentH = maxY - minY + PAD * 2;
  scale = Math.min(VW / contentW, VH / contentH);
  panX = (VW - contentW * scale) / 2 - (minX - PAD) * scale;
  panY = (VH - contentH * scale) / 2 - (minY - PAD) * scale;
  const stage = document.getElementById('mapStage');
  stage.style.transition = 'transform .5s cubic-bezier(.25,.46,.45,.94)';
  applyTransform();
  setTimeout(() => { stage.style.transition = ''; updateMapVisibility(); }, 520);
}

function positionMipStars(panel) {
  const mipImg   = panel.querySelector('.mip-img');
  const mipWrap  = panel.querySelector('.mip-img-wrap');
  const mipStars = panel.querySelector('.mip-stars');
  if (!mipStars || !mipImg || !mipWrap) return;
  const doPos = () => {
    const cW = mipWrap.clientWidth, cH = mipWrap.clientHeight;
    if (!cW || !cH || !mipImg.naturalWidth) return;
    const iRatio = mipImg.naturalWidth / mipImg.naturalHeight;
    const cRatio = cW / cH;
    let renderedH, imgBottom;
    if (iRatio > cRatio) {
      renderedH = cW / iRatio;
      imgBottom = (cH + renderedH) / 2;
    } else {
      renderedH = cH;
      imgBottom = cH;
    }
    mipStars.style.top    = (imgBottom - renderedH * 0.05) + 'px';
    mipStars.style.bottom = 'auto';
    mipStars.style.transform = 'translateY(-100%)';
  };
  // ResizeObserver: recalculate on every panel/window resize
  if (!panel._starsObserver) {
    panel._starsObserver = new ResizeObserver(() => {
      if (mipImg.complete && mipImg.naturalWidth) doPos();
    });
    panel._starsObserver.observe(mipWrap);
  }
  if (mipImg.complete && mipImg.naturalWidth) {
    requestAnimationFrame(doPos);
  } else {
    mipImg.addEventListener('load', () => requestAnimationFrame(doPos), { once: true });
  }
}

document.getElementById('star-filter-btn').addEventListener('click', e => {
  e.stopPropagation();

  document.getElementById('star-filter-panel').classList.toggle('open');

document.querySelectorAll('.sfp-row').forEach(rowEl => {
  rowEl.addEventListener('click', e => {
    e.stopPropagation();
    const val = parseInt(rowEl.dataset.val);
    if (selectedStars.has(val)) {
      selectedStars.delete(val);
      rowEl.classList.remove('active');
    } else {
      selectedStars.add(val);
      rowEl.classList.add('active');
    }
    document.getElementById('star-filter-btn').classList.toggle('has-active', selectedStars.size > 0);
    applyFilter(currentFilter);
    applyStarFilterToMap();
  });
});
