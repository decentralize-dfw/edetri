<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EDETRI — Visual Archive</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Archivo:wght@200;300;400;500&family=IBM+Plex+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #090807;
    --cream: #e8e0d0;
    --offwhite: #f4f0e8;
    --silver: #b0a890;
    --copper: #a86828;
    --burgundy: #581020;
    --gold: #b89850;
    --dim: #2a2720;
    --gap: 8px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--black);
    color: var(--cream);
    font-family: 'Archivo', sans-serif;
    font-weight: 200;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
    opacity: 0.04;
    pointer-events: none;
    z-index: 9999;
  }

  /* ─── HEADER ─── */
  header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(9,8,7,0.95);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(176,168,144,0.12);
    padding: 0 24px;
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 0;
    gap: 12px;
  }

  .header-title {
    font-family: 'Playfair Display', serif;
    font-size: 17px;
    font-weight: 400;
    letter-spacing: 0.12em;
    color: var(--cream);
    text-transform: uppercase;
    white-space: nowrap;
  }

  .header-title span {
    color: var(--copper);
    font-style: italic;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .status-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--silver);
    display: inline-block;
    margin-right: 6px;
    transition: background 0.3s;
  }
  .status-dot.loading { background: var(--gold); animation: pulse 1s infinite; }
  .status-dot.ready   { background: #5a8a5a; }
  .status-dot.error   { background: var(--burgundy); }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  .status-text {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--silver);
    letter-spacing: 0.06em;
  }

  /* Map button */
  .btn-map {
    background: none;
    border: 1px solid rgba(176,168,144,0.25);
    color: var(--silver);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    padding: 6px 13px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
    text-transform: uppercase;
  }
  .btn-map:hover, .btn-map.active {
    border-color: var(--copper);
    color: var(--copper);
    background: rgba(168,104,40,0.08);
  }

  /* ─── FILTER BAR ─── */
  .filter-bar {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 0 0 12px;
    overflow-x: auto;
    scrollbar-width: none;
    flex-wrap: wrap;
  }
  .filter-bar::-webkit-scrollbar { display: none; }

  .filter-chip {
    background: none;
    border: 1px solid rgba(176,168,144,0.18);
    color: rgba(176,168,144,0.6);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 5px 11px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
    border-radius: 1px;
    flex-shrink: 0;
  }
  .filter-chip:hover {
    border-color: rgba(176,168,144,0.5);
    color: var(--cream);
  }
  .filter-chip.active {
    background: var(--copper);
    border-color: var(--copper);
    color: var(--black);
    font-weight: 400;
  }
  .filter-chip.all-chip {
    border-color: rgba(176,168,144,0.35);
    color: var(--silver);
  }
  .filter-chip.all-chip.active {
    background: rgba(176,168,144,0.15);
    border-color: var(--silver);
    color: var(--cream);
  }

  /* ─── MASONRY GRID ─── */
  .gallery-wrap {
    padding: 24px var(--gap);
  }

  .masonry {
    column-count: 5;
    column-gap: var(--gap);
  }

  @media (max-width: 1400px) { .masonry { column-count: 4; } }
  @media (max-width: 1100px) { .masonry { column-count: 3; } }
  @media (max-width: 720px)  { .masonry { column-count: 3; } }
  @media (max-width: 480px)  { .masonry { column-count: 3; } }

  .card {
    break-inside: avoid;
    margin-bottom: var(--gap);
    position: relative;
    cursor: pointer;
    overflow: hidden;
    border-radius: 2px;
    background: var(--dim);
    transition: opacity 0.3s, transform 0.3s;
  }

  .card.hidden {
    display: none;
  }

  .card img {
    display: block;
    width: 100%;
    height: auto;
    transition: transform 0.4s ease;
  }

  .card:hover img { transform: scale(1.03); }

  .card-overlay {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 20px 8px 8px;
    background: linear-gradient(to top, rgba(9,8,7,0.85) 0%, transparent 100%);
    opacity: 0;
    transition: opacity 0.3s;
    display: flex;
    align-items: flex-end;
    gap: 5px;
  }

  .card:hover .card-overlay { opacity: 1; }

  .card-color {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
    border: 1px solid rgba(255,255,255,0.2);
  }

  .card-type {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 8px;
    letter-spacing: 0.08em;
    color: var(--cream);
    text-transform: uppercase;
    opacity: 0.85;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .card-placeholder {
    width: 100%;
    aspect-ratio: 3/4;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    color: rgba(176,168,144,0.3);
    letter-spacing: 0.08em;
  }

  /* ─── LOADING STATE ─── */
  .loading-state {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 60vh;
    flex-direction: column;
    gap: 16px;
    color: var(--silver);
  }

  .loading-state p {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    opacity: 0.5;
  }

  .spinner {
    width: 24px;
    height: 24px;
    border: 1px solid rgba(176,168,144,0.2);
    border-top-color: var(--copper);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ─── FULLSCREEN MODAL ─── */
  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(9,8,7,0.99);
    z-index: 1000;
    display: flex;
    flex-direction: column;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s;
  }

  .modal-backdrop.open {
    opacity: 1;
    pointer-events: all;
  }

  .modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px;
    flex-shrink: 0;
    border-bottom: 1px solid rgba(176,168,144,0.08);
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    z-index: 10;
    background: linear-gradient(to bottom, rgba(9,8,7,0.9) 0%, transparent 100%);
  }

  .modal-close {
    background: none;
    border: none;
    color: var(--silver);
    font-size: 18px;
    cursor: pointer;
    width: 34px;
    height: 34px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    transition: all 0.2s;
    flex-shrink: 0;
  }

  .modal-close:hover { background: rgba(176,168,144,0.1); color: var(--cream); }

  .modal-counter {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--silver);
    letter-spacing: 0.08em;
    opacity: 0.5;
  }

  .nav-arrows {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .nav-btn {
    background: rgba(9,8,7,0.6);
    border: 1px solid rgba(176,168,144,0.2);
    color: var(--silver);
    font-size: 14px;
    width: 34px;
    height: 34px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    border-radius: 2px;
  }

  .nav-btn:hover {
    border-color: var(--copper);
    color: var(--copper);
  }

  .modal-image-full {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .modal-image-full img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
  }

  /* Bottom info strip */
  .modal-info-strip {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 80px 28px 24px;
    background: linear-gradient(to top, rgba(9,8,7,0.92) 0%, transparent 100%);
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 16px;
    z-index: 10;
    pointer-events: none;
  }

  .modal-info-left {
    display: flex;
    flex-direction: column;
    gap: 8px;
    pointer-events: all;
  }

  .modal-color-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .modal-color-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.2);
    flex-shrink: 0;
  }

  .modal-color-hex-text {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--silver);
    letter-spacing: 0.08em;
    opacity: 0.7;
  }

  /* Big title in modal */
  .modal-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(22px, 4vw, 42px);
    font-weight: 400;
    font-style: italic;
    color: var(--cream);
    line-height: 1.15;
    letter-spacing: 0.01em;
    max-width: 60vw;
  }

  .modal-desc-text {
    font-family: 'Archivo', sans-serif;
    font-size: 13px;
    font-weight: 300;
    color: var(--silver);
    opacity: 0.75;
    line-height: 1.5;
    max-width: 50vw;
  }

  .modal-info-right {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 10px;
    pointer-events: all;
  }

  .pinterest-link {
    display: flex;
    align-items: center;
    gap: 6px;
    color: var(--silver);
    text-decoration: none;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.08em;
    opacity: 0.4;
    transition: opacity 0.2s;
  }

  .pinterest-link:hover { opacity: 0.9; color: var(--copper); }

  .keyboard-hint {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    color: var(--silver);
    opacity: 0.25;
    letter-spacing: 0.06em;
  }

  /* ─── MAP VIEW ─── */
  .map-view {
    display: none;
    position: fixed;
    inset: 0;
    background: #060504;
    z-index: 200;
    overflow: hidden;
    opacity: 0;
    transition: opacity 0.35s;
    cursor: grab;
    user-select: none;
  }
  .map-view:active { cursor: grabbing; }
  .map-view.visible { opacity: 1; }

  .map-stage {
    position: absolute;
    top: 0; left: 0;
    transform-origin: 0 0;
    will-change: transform;
  }

  .map-close-btn {
    position: fixed;
    top: 18px;
    right: 18px;
    background: rgba(20,18,14,0.9);
    border: 1px solid rgba(176,168,144,0.2);
    color: var(--silver);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    padding: 8px 16px;
    cursor: pointer;
    z-index: 300;
    transition: all 0.2s;
    text-transform: uppercase;
    backdrop-filter: blur(8px);
  }
  .map-close-btn:hover { border-color: var(--copper); color: var(--copper); }

  .map-title {
    position: fixed;
    top: 22px;
    left: 24px;
    font-family: 'Playfair Display', serif;
    font-size: 13px;
    font-style: italic;
    color: rgba(176,168,144,0.25);
    letter-spacing: 0.1em;
    z-index: 300;
    pointer-events: none;
  }

  .map-hint {
    position: fixed;
    bottom: 18px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    color: rgba(176,168,144,0.18);
    letter-spacing: 0.08em;
    z-index: 300;
    pointer-events: none;
    white-space: nowrap;
  }

  .map-cluster-label {
    position: absolute;
    pointer-events: none;
    text-align: center;
    transform: translateX(-50%);
  }
  .map-cluster-label-text {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 32px;
    font-weight: 400;
    color: rgba(176,168,144,0.07);
    letter-spacing: 0.04em;
    white-space: nowrap;
    line-height: 1;
    text-transform: capitalize;
  }
  .map-cluster-label-sub {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 8px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: rgba(168,104,40,0.2);
    margin-top: 5px;
  }

  .map-island {
    position: absolute;
    cursor: pointer;
  }
  .map-island:hover .map-island-inner {
    outline: 1px solid rgba(168,104,40,0.55);
    box-shadow: 0 0 28px rgba(168,104,40,0.12), 0 14px 44px rgba(0,0,0,0.75);
  }
  .map-island-inner {
    position: relative;
    border-radius: 2px;
    overflow: hidden;
    box-shadow: 0 6px 22px rgba(0,0,0,0.55);
    transition: box-shadow 0.2s, outline 0.2s;
    width: 100%;
    height: 100%;
  }
  .map-island img {
    display: block;
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .map-island-hover-label {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    padding: 18px 6px 5px;
    background: linear-gradient(to top, rgba(9,8,7,0.92), transparent);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 7px;
    letter-spacing: 0.1em;
    color: var(--cream);
    text-transform: uppercase;
    opacity: 0;
    transition: opacity 0.18s;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .map-island:hover .map-island-hover-label { opacity: 1; }

  /* ─── TOAST ─── */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--dim);
    border: 1px solid rgba(176,168,144,0.2);
    color: var(--cream);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    padding: 10px 20px;
    z-index: 9998;
    transition: transform 0.3s;
    pointer-events: none;
    max-width: 90vw;
    text-align: center;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }

  /* ─── MOBILE ─── */
  @media (max-width: 600px) {
    header { padding: 0 14px; }
    .header-title { font-size: 13px; }
    .status-text { display: none; }

    .gallery-wrap { padding: 6px 4px; }
    .masonry { column-count: 3; column-gap: 4px; }
    .card { margin-bottom: 4px; }
    .card-overlay { display: none; }

    .modal-backdrop { background: #000; }
    .modal-info-strip {
      padding: 60px 14px 14px;
      flex-direction: column;
      align-items: flex-start;
    }
    .modal-title { font-size: clamp(16px, 5vw, 26px); max-width: 90vw; }
    .modal-desc-text { max-width: 90vw; }
    .keyboard-hint { display: none; }
    .map-hint { display: none; }
  }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <div class="header-title">EDETRI — <span>Visual Archive</span></div>
    <div class="header-right">
      <div style="display:flex;align-items:center;gap:6px">
        <span class="status-dot loading" id="statusDot"></span>
        <span class="status-text" id="statusText">Loading...</span>
      </div>
      <button class="btn-map" id="mapBtn" onclick="toggleMap()">⊕ Map</button>
    </div>
  </div>
  <div class="filter-bar" id="filterBar"></div>
</header>

<main class="gallery-wrap">
  <div class="loading-state" id="loadingState">
    <div class="spinner"></div>
    <p>Fetching visual archive...</p>
  </div>
  <div class="masonry" id="masonry" style="display:none"></div>
</main>

<!-- Fullscreen Modal -->
<div class="modal-backdrop" id="modal" role="dialog" aria-modal="true">
  <div class="modal-image-full">
    <img id="modalImg" src="" alt="" referrerpolicy="no-referrer">
  </div>

  <div class="modal-header">
    <div style="display:flex;align-items:center;gap:12px">
      <button class="modal-close" onclick="closeModal()" title="Close (Esc)">✕</button>
      <span class="modal-counter" id="modalCounter"></span>
    </div>
    <div class="nav-arrows">
      <button class="nav-btn" onclick="navigateModal(-1)" title="Previous (←)">←</button>
      <button class="nav-btn" onclick="navigateModal(1)" title="Next (→)">→</button>
    </div>
  </div>

  <div class="modal-info-strip">
    <div class="modal-info-left">
      <div class="modal-color-row">
        <div class="modal-color-dot" id="modalColorDot" style="display:none"></div>
        <span class="modal-color-hex-text" id="modalColorHex"></span>
      </div>
      <div class="modal-title" id="modalTitle"></div>
      <div class="modal-desc-text" id="modalDesc"></div>
    </div>
    <div class="modal-info-right">
      <a class="pinterest-link" id="modalPinterestLink" href="#" target="_blank" rel="noopener noreferrer" referrerpolicy="no-referrer">
        ↗ Pinterest
      </a>
      <span class="keyboard-hint">← → nav · Esc close</span>
    </div>
  </div>
</div>

<!-- Map View -->
<div class="map-view" id="mapView">
  <div class="map-title">EDETRI — Constellation</div>
  <button class="map-close-btn" onclick="toggleMap()">✕ Close</button>
  <div class="map-stage" id="mapStage"></div>
  <div class="map-hint">scroll to zoom · drag to pan · click to open</div>
</div>

<div class="toast" id="toast"></div>

<script>
  const SHEET_ID = '1o3kX-cYFY8RjPWfQN5kzzGQf_2g-ZxJvan9Mu7Jf7pQ';
  const GVIZ_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&headers=0&range=B10%3AG&gid=0`;

  let rows = [];
  let currentIdx = -1;
  let activeFilter = 'all';
  let visibleIndices = [];
  let mapOpen = false;
  let mapPanX = 0, mapPanY = 0, mapScale = 1;
  let mapDragging = false, mapDragStartX, mapDragStartY, mapDragPanX, mapDragPanY;
  let mapBuilt = false;

  // ─── FETCH ─────────────────────────────────────────────────────
  async function init() {
    try {
      const res = await fetch(GVIZ_URL);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const text = await res.text();
      const jsonStr = text.slice(text.indexOf('(') + 1, text.lastIndexOf(')'));
      const json = JSON.parse(jsonStr);
      if (json.status !== 'ok') throw new Error('Spreadsheet data unavailable');

      const records = json.table.rows.map(row =>
        (row.c || []).map(cell => cell && cell.v != null ? String(cell.v) : '')
      );

      rows = [];
      for (let i = 0; i < records.length; i++) {
        const r = records[i];
        const imgUrl = (r[0] || '').trim();
        if (!imgUrl) continue;
        rows.push({
          rowNum:       i + 10,
          imgUrl,
          color:        (r[2] || '').trim(),
          pinterestUrl: (r[3] || '').trim(),
          type:         (r[4] || '').trim(),
          description:  (r[5] || '').trim(),
        });
      }

      renderFilters();
      renderMasonry();
      setStatus('ready', `${rows.length} images`);
      // Open map view by default
      setTimeout(() => toggleMap(), 200);
    } catch (err) {
      setStatus('error', 'Failed to load');
      document.getElementById('loadingState').innerHTML =
        `<p style="color:var(--burgundy);font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.08em;text-align:center;padding:40px">
          Error: ${err.message}<br><br>
          <span style="opacity:.5">Check console or open via a server</span>
        </p>`;
    }
  }

  // ─── FILTERS ───────────────────────────────────────────────────
  function renderFilters() {
    const bar = document.getElementById('filterBar');
    bar.innerHTML = '';

    const types = [...new Set(rows.map(r => r.type).filter(Boolean))].sort();
    if (types.length === 0) return;

    const allChip = document.createElement('button');
    allChip.className = 'filter-chip all-chip active';
    allChip.textContent = 'All';
    allChip.dataset.filter = 'all';
    allChip.onclick = () => applyFilter('all');
    bar.appendChild(allChip);

    types.forEach(type => {
      const chip = document.createElement('button');
      chip.className = 'filter-chip';
      chip.textContent = type;
      chip.dataset.filter = type;
      chip.onclick = () => applyFilter(type);
      bar.appendChild(chip);
    });
  }

  function applyFilter(filter) {
    activeFilter = filter;

    // Update chips
    document.querySelectorAll('.filter-chip').forEach(chip => {
      chip.classList.toggle('active', chip.dataset.filter === filter);
    });

    // Show/hide cards
    document.querySelectorAll('.card').forEach(card => {
      const idx = parseInt(card.dataset.idx);
      const row = rows[idx];
      const match = filter === 'all' || row.type === filter;
      card.classList.toggle('hidden', !match);
    });

    // Rebuild visible indices for modal nav
    visibleIndices = rows
      .map((r, i) => ({ r, i }))
      .filter(({ r }) => filter === 'all' || r.type === filter)
      .map(({ i }) => i);
  }

  // ─── MASONRY ───────────────────────────────────────────────────
  function renderMasonry() {
    const masonry = document.getElementById('masonry');
    masonry.innerHTML = '';

    rows.forEach((row, idx) => {
      const card = document.createElement('div');
      card.className = 'card';
      card.dataset.idx = idx;
      card.onclick = () => openModal(idx);

      const img = document.createElement('img');
      img.src = row.imgUrl;
      img.alt = row.type || '';
      img.loading = 'lazy';
      img.referrerPolicy = 'no-referrer';
      img.onerror = () => {
        img.style.display = 'none';
        let ph = card.querySelector('.card-placeholder');
        if (!ph) {
          ph = document.createElement('div');
          ph.className = 'card-placeholder';
          card.insertBefore(ph, card.firstChild);
        }
        ph.style.background = row.color || 'var(--dim)';
        ph.textContent = row.color || '—';
      };

      const overlay = document.createElement('div');
      overlay.className = 'card-overlay';

      if (row.color) {
        const dot = document.createElement('div');
        dot.className = 'card-color';
        dot.style.background = row.color;
        overlay.appendChild(dot);
      }

      if (row.type) {
        const typeEl = document.createElement('span');
        typeEl.className = 'card-type';
        typeEl.textContent = row.type;
        overlay.appendChild(typeEl);
      }

      card.appendChild(img);
      card.appendChild(overlay);
      masonry.appendChild(card);
    });

    document.getElementById('loadingState').style.display = 'none';
    masonry.style.display = '';

    // init visible indices
    visibleIndices = rows.map((_, i) => i);
  }

  // ─── MODAL ─────────────────────────────────────────────────────
  function openModal(idx) {
    currentIdx = idx;
    const row = rows[idx];

    document.getElementById('modalImg').src = row.imgUrl;

    const dot = document.getElementById('modalColorDot');
    const hexEl = document.getElementById('modalColorHex');
    if (row.color) {
      dot.style.background = row.color;
      dot.style.display = 'block';
      hexEl.textContent = row.color.toUpperCase();
    } else {
      dot.style.display = 'none';
      hexEl.textContent = '';
    }

    document.getElementById('modalTitle').textContent = row.type || '';
    document.getElementById('modalDesc').textContent = row.description || '';

    const link = document.getElementById('modalPinterestLink');
    if (row.pinterestUrl) {
      link.href = row.pinterestUrl;
      link.style.display = 'flex';
    } else {
      link.style.display = 'none';
    }

    // Counter based on visible
    const visPos = visibleIndices.indexOf(idx);
    const counterIdx = visPos >= 0 ? visPos + 1 : idx + 1;
    document.getElementById('modalCounter').textContent = `${counterIdx} / ${visibleIndices.length}`;

    document.getElementById('modal').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeModal() {
    document.getElementById('modal').classList.remove('open');
    document.body.style.overflow = '';
    currentIdx = -1;
  }

  function navigateModal(dir) {
    if (currentIdx < 0) return;
    const pos = visibleIndices.indexOf(currentIdx);
    if (pos < 0) return;
    const nextPos = (pos + dir + visibleIndices.length) % visibleIndices.length;
    openModal(visibleIndices[nextPos]);
  }

  // ─── MAP VIEW ──────────────────────────────────────────────────

  function applyMapTransform() {
    document.getElementById('mapStage').style.transform =
      `translate(${mapPanX}px, ${mapPanY}px) scale(${mapScale})`;
  }

  function toggleMap() {
    const view = document.getElementById('mapView');
    mapOpen = !mapOpen;
    document.getElementById('mapBtn').classList.toggle('active', mapOpen);

    if (mapOpen) {
      view.style.display = 'block';
      if (!mapBuilt) { buildMap(); mapBuilt = true; }
      requestAnimationFrame(() => view.classList.add('visible'));
      document.body.style.overflow = 'hidden';
    } else {
      view.classList.remove('visible');
      setTimeout(() => {
        view.style.display = 'none';
        document.body.style.overflow = '';
      }, 350);
    }
  }

  function applyMapTransform() {
    document.getElementById('mapStage').style.transform =
      `translate(${mapPanX}px, ${mapPanY}px) scale(${mapScale})`;
  }

  function buildMap() {
    const stage = document.getElementById('mapStage');
    stage.innerHTML = '';

    const VW = window.innerWidth;
    const VH = window.innerHeight;

    // Seeded RNG for stable layout
    let seed = 137;
    function rng() {
      seed = (seed * 1664525 + 1013904223) >>> 0;
      return seed / 0xffffffff;
    }

    const types = [...new Set(rows.map(r => r.type).filter(Boolean))];
    const ungrouped = rows.filter(r => !r.type);

    // ── Layout: arrange clusters in a grid-ish pattern inside a logical canvas ──
    // We'll compute positions in "world space", then fit to screen

    const WORLD_W = 2400;
    const WORLD_H = 1600;

    // Place clusters in a balanced grid
    const cols = Math.ceil(Math.sqrt(types.length));
    const rows_count = Math.ceil(types.length / cols);
    const cellW = WORLD_W / cols;
    const cellH = WORLD_H / rows_count;

    const centers = types.map((_, i) => {
      const col = i % cols;
      const row = Math.floor(i / cols);
      // slight jitter so it feels organic not grid-like
      const jX = (rng() - 0.5) * cellW * 0.3;
      const jY = (rng() - 0.5) * cellH * 0.3;
      return {
        x: cellW * (col + 0.5) + jX,
        y: cellH * (row + 0.5) + jY,
      };
    });

    // Collect all placed items for bounds calc
    const allItems = []; // {el, x, y, w, h}

    function placeCluster(rowGroup, cx, cy) {
      const count = rowGroup.length;
      // Spiral placement around center
      rowGroup.forEach((row, j) => {
        const globalIdx = rows.indexOf(row);
        const angle = (j / count) * Math.PI * 2 + rng() * 0.8;
        const ring = Math.floor(j / 8);
        const minR = 80 + ring * 110;
        const maxR = minR + 100;
        const dist = minR + rng() * (maxR - minR);
        const px = cx + Math.cos(angle) * dist;
        const py = cy + Math.sin(angle) * dist;

        const sizeRoll = rng();
        let w, h;
        if (sizeRoll < 0.12)       { w = 120; h = 160; }
        else if (sizeRoll < 0.38)  { w = 85;  h = 112; }
        else                       { w = 58;  h = 77;  }

        const ix = px - w / 2;
        const iy = py - h / 2;
        const rot = (rng() - 0.5) * 6;

        const island = document.createElement('div');
        island.className = 'map-island';
        island.style.cssText = `left:${ix}px;top:${iy}px;width:${w}px;height:${h}px;transform:rotate(${rot}deg);`;

        const inner = document.createElement('div');
        inner.className = 'map-island-inner';

        const img = document.createElement('img');
        img.src = row.imgUrl;
        img.referrerPolicy = 'no-referrer';
        img.alt = '';
        img.loading = 'lazy';
        img.onerror = () => { inner.style.background = row.color || 'var(--dim)'; img.remove(); };

        const hLbl = document.createElement('div');
        hLbl.className = 'map-island-hover-label';
        hLbl.textContent = row.type || '';

        inner.appendChild(img);
        inner.appendChild(hLbl);
        island.appendChild(inner);

        island.addEventListener('click', e => {
          e.stopPropagation();
          toggleMap();
          setTimeout(() => openModal(globalIdx), 360);
        });

        stage.appendChild(island);
        allItems.push({ el: island, x: ix, y: iy, w, h });
      });
    }

    types.forEach((type, i) => {
      const group = rows.filter(r => r.type === type);
      placeCluster(group, centers[i].x, centers[i].y);
    });

    if (ungrouped.length > 0) {
      placeCluster(ungrouped, WORLD_W / 2, WORLD_H * 0.88);
    }

    // ── Cluster labels (rendered above islands) ──
    types.forEach((type, i) => {
      const lbl = document.createElement('div');
      lbl.className = 'map-cluster-label';
      lbl.style.left = centers[i].x + 'px';
      lbl.style.top  = (centers[i].y - 60) + 'px';

      const t = document.createElement('div');
      t.className = 'map-cluster-label-text';
      t.textContent = type;

      const sub = document.createElement('div');
      sub.className = 'map-cluster-label-sub';
      const cnt = rows.filter(r => r.type === type).length;
      sub.textContent = `${cnt} item${cnt !== 1 ? 's' : ''}`;

      lbl.appendChild(t);
      lbl.appendChild(sub);
      stage.appendChild(lbl);
    });

    // ── Compute actual bounding box of all islands ──
    if (allItems.length === 0) return;
    const PAD = 80;
    const minX = Math.min(...allItems.map(it => it.x)) - PAD;
    const minY = Math.min(...allItems.map(it => it.y)) - PAD;
    const maxX = Math.max(...allItems.map(it => it.x + it.w)) + PAD;
    const maxY = Math.max(...allItems.map(it => it.y + it.h)) + PAD;
    const contentW = maxX - minX;
    const contentH = maxY - minY;

    // ── Fit to viewport ──
    const scaleX = VW / contentW;
    const scaleY = VH / contentH;
    mapScale = Math.min(scaleX, scaleY, 1); // never upscale beyond 1x initially

    // Center within viewport
    mapPanX = (VW - contentW * mapScale) / 2 - minX * mapScale;
    mapPanY = (VH - contentH * mapScale) / 2 - minY * mapScale;

    applyMapTransform();

    // ── Pan interaction ──
    const view = document.getElementById('mapView');

    view.addEventListener('mousedown', e => {
      if (e.target.closest('.map-island') || e.target.closest('.map-close-btn')) return;
      mapDragging = true;
      mapDragStartX = e.clientX;
      mapDragStartY = e.clientY;
      mapDragPanX = mapPanX;
      mapDragPanY = mapPanY;
    });

    window.addEventListener('mousemove', e => {
      if (!mapDragging) return;
      mapPanX = mapDragPanX + (e.clientX - mapDragStartX);
      mapPanY = mapDragPanY + (e.clientY - mapDragStartY);
      applyMapTransform();
    });

    window.addEventListener('mouseup', () => { mapDragging = false; });

    // ── Scroll zoom ──
    view.addEventListener('wheel', e => {
      e.preventDefault();
      const delta = e.deltaY > 0 ? 0.92 : 1.08;
      const newScale = Math.min(Math.max(mapScale * delta, 0.15), 3);

      // Zoom toward cursor
      const rect = view.getBoundingClientRect();
      const mx = e.clientX - rect.left;
      const my = e.clientY - rect.top;

      mapPanX = mx - (mx - mapPanX) * (newScale / mapScale);
      mapPanY = my - (my - mapPanY) * (newScale / mapScale);
      mapScale = newScale;
      applyMapTransform();
    }, { passive: false });

    // Touch pan
    let t1x, t1y;
    view.addEventListener('touchstart', e => {
      if (e.target.closest('.map-island')) return;
      const t = e.touches[0];
      mapDragging = true;
      t1x = t.clientX; t1y = t.clientY;
      mapDragPanX = mapPanX; mapDragPanY = mapPanY;
    }, { passive: true });

    view.addEventListener('touchmove', e => {
      if (!mapDragging) return;
      const t = e.touches[0];
      mapPanX = mapDragPanX + (t.clientX - t1x);
      mapPanY = mapDragPanY + (t.clientY - t1y);
      applyMapTransform();
    }, { passive: true });

    view.addEventListener('touchend', () => { mapDragging = false; });
  }

  // ─── HELPERS ───────────────────────────────────────────────────
  function setStatus(state, text) {
    document.getElementById('statusDot').className = `status-dot ${state}`;
    document.getElementById('statusText').textContent = text;
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast show';
    clearTimeout(t._timer);
    t._timer = setTimeout(() => t.classList.remove('show'), 3000);
  }

  // ─── KEYBOARD ──────────────────────────────────────────────────
  document.addEventListener('keydown', e => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

    const modal = document.getElementById('modal');
    if (modal.classList.contains('open')) {
      if (e.key === 'Escape')      closeModal();
      if (e.key === 'ArrowLeft')   navigateModal(-1);
      if (e.key === 'ArrowRight')  navigateModal(1);
    } else if (mapOpen) {
      if (e.key === 'Escape') toggleMap();
    }
  });

  document.getElementById('modal').addEventListener('click', e => {
    if (e.target === document.getElementById('modal') ||
        e.target === document.querySelector('.modal-image-full')) {
      closeModal();
    }
  });

  init();
</script>
</body>
