<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EDETRI — Visual Archive</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Archivo:wght@200;300;400;500&family=IBM+Plex+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #090807;
    --cream: #e8e0d0;
    --offwhite: #f4f0e8;
    --silver: #b0a890;
    --copper: #a86828;
    --burgundy: #581020;
    --gold: #b89850;
    --dim: #2a2720;
    --gap: 8px;
    --edit-accent: #c87820;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--black);
    color: var(--cream);
    font-family: 'Archivo', sans-serif;
    font-weight: 200;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grain overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
    opacity: 0.04;
    pointer-events: none;
    z-index: 9999;
  }

  /* ─── EDIT MODE INDICATOR ─── */
  body.edit-mode {
    --mode-border: var(--edit-accent);
  }

  .edit-mode-bar {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    height: 2px;
    background: var(--edit-accent);
    z-index: 9998;
    animation: editPulse 2s ease-in-out infinite;
  }

  body.edit-mode .edit-mode-bar { display: block; }

  @keyframes editPulse { 0%,100%{opacity:1} 50%{opacity:0.5} }

  /* ─── HEADER ─── */
  header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(9,8,7,0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(176,168,144,0.12);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    transition: border-color 0.3s;
  }

  body.edit-mode header {
    border-bottom-color: rgba(200,120,32,0.3);
  }

  .header-title {
    font-family: 'Playfair Display', serif;
    font-size: 17px;
    font-weight: 400;
    letter-spacing: 0.12em;
    color: var(--cream);
    text-transform: uppercase;
    white-space: nowrap;
  }

  .header-title span {
    color: var(--copper);
    font-style: italic;
  }

  .header-actions {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }

  .btn {
    background: none;
    border: 1px solid rgba(176,168,144,0.3);
    color: var(--silver);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    padding: 7px 14px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .btn:hover {
    border-color: var(--copper);
    color: var(--copper);
  }

  .btn-primary {
    background: var(--copper);
    border-color: var(--copper);
    color: var(--black);
    font-weight: 400;
  }

  .btn-primary:hover {
    background: var(--gold);
    border-color: var(--gold);
    color: var(--black);
  }

  .btn-publish {
    background: #2a5a2a;
    border-color: #3a7a3a;
    color: #7aba7a;
    display: none;
    animation: publishAppear 0.3s ease;
  }

  .btn-publish:hover {
    background: #3a7a3a;
    border-color: #5aaa5a;
    color: #aadaaa;
  }

  body.edit-mode .btn-publish { display: inline-block; }

  @keyframes publishAppear {
    from { opacity: 0; transform: translateX(8px); }
    to   { opacity: 1; transform: translateX(0); }
  }

  .btn-edit-toggle {
    position: relative;
  }

  body.edit-mode .btn-edit-toggle {
    border-color: var(--edit-accent);
    color: var(--edit-accent);
    background: rgba(200,120,32,0.08);
  }

  .edit-badge {
    display: none;
    position: absolute;
    top: -5px;
    right: -5px;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--edit-accent);
    border: 1px solid var(--black);
  }

  body.edit-mode .edit-badge { display: block; }

  .status-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--silver);
    display: inline-block;
    margin-right: 6px;
    transition: background 0.3s;
  }

  .status-dot.loading { background: var(--gold); animation: pulse 1s infinite; }
  .status-dot.ready { background: #5a8a5a; }
  .status-dot.error { background: var(--burgundy); }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  .status-text {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--silver);
    letter-spacing: 0.06em;
  }

  /* ─── MASONRY GRID ─── */
  .gallery-wrap {
    padding: 24px var(--gap);
  }

  .masonry {
    column-count: 5;
    column-gap: var(--gap);
  }

  @media (max-width: 1400px) { .masonry { column-count: 4; } }
  @media (max-width: 1100px) { .masonry { column-count: 3; } }
  @media (max-width: 720px)  { .masonry { column-count: 3; } }
  @media (max-width: 480px)  { .masonry { column-count: 3; } }

  .card {
    break-inside: avoid;
    margin-bottom: var(--gap);
    position: relative;
    cursor: pointer;
    overflow: hidden;
    border-radius: 2px;
    background: var(--dim);
    transition: outline 0.2s;
  }

  body.edit-mode .card:hover {
    outline: 1px solid var(--edit-accent);
  }

  .card img {
    display: block;
    width: 100%;
    height: auto;
    transition: transform 0.4s ease;
  }

  .card:hover img { transform: scale(1.03); }

  .card-overlay {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 20px 8px 8px;
    background: linear-gradient(to top, rgba(9,8,7,0.85) 0%, transparent 100%);
    opacity: 0;
    transition: opacity 0.3s;
    display: flex;
    align-items: flex-end;
    gap: 5px;
  }

  .card:hover .card-overlay { opacity: 1; }

  .card-color {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
    border: 1px solid rgba(255,255,255,0.2);
  }

  .card-type {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 8px;
    letter-spacing: 0.08em;
    color: var(--cream);
    text-transform: uppercase;
    opacity: 0.85;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .card-placeholder {
    width: 100%;
    aspect-ratio: 3/4;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    color: rgba(176,168,144,0.3);
    letter-spacing: 0.08em;
  }

  /* ─── LOADING STATE ─── */
  .loading-state {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 60vh;
    flex-direction: column;
    gap: 16px;
    color: var(--silver);
  }

  .loading-state p {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    opacity: 0.5;
  }

  .spinner {
    width: 24px;
    height: 24px;
    border: 1px solid rgba(176,168,144,0.2);
    border-top-color: var(--copper);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ─── FULLSCREEN MODAL ─── */
  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(9,8,7,0.99);
    z-index: 1000;
    display: flex;
    flex-direction: column;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s;
  }

  .modal-backdrop.open {
    opacity: 1;
    pointer-events: all;
  }

  .modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px;
    flex-shrink: 0;
    border-bottom: 1px solid rgba(176,168,144,0.08);
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    z-index: 10;
    background: linear-gradient(to bottom, rgba(9,8,7,0.9) 0%, transparent 100%);
  }

  .modal-close {
    background: none;
    border: none;
    color: var(--silver);
    font-size: 18px;
    cursor: pointer;
    width: 34px;
    height: 34px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    transition: all 0.2s;
    flex-shrink: 0;
  }

  .modal-close:hover { background: rgba(176,168,144,0.1); color: var(--cream); }

  .modal-counter {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--silver);
    letter-spacing: 0.08em;
    opacity: 0.5;
  }

  .nav-arrows {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .nav-btn {
    background: rgba(9,8,7,0.6);
    border: 1px solid rgba(176,168,144,0.2);
    color: var(--silver);
    font-size: 14px;
    width: 34px;
    height: 34px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    border-radius: 2px;
  }

  .nav-btn:hover {
    border-color: var(--copper);
    color: var(--copper);
  }

  /* Fullscreen image layout */
  .modal-image-full {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .modal-image-full img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
  }

  /* Bottom info strip */
  .modal-info-strip {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 48px 24px 20px;
    background: linear-gradient(to top, rgba(9,8,7,0.9) 0%, transparent 100%);
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 16px;
    z-index: 10;
    pointer-events: none;
  }

  .modal-info-left {
    display: flex;
    flex-direction: column;
    gap: 6px;
    pointer-events: all;
  }

  .modal-color-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .modal-color-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.2);
    flex-shrink: 0;
  }

  .modal-color-hex-text {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--silver);
    letter-spacing: 0.08em;
    opacity: 0.7;
  }

  /* Editable modal fields — normal mode: read-only styled */
  .modal-field-type {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--cream);
    opacity: 0.9;
    background: none;
    border: none;
    outline: none;
    pointer-events: none;
    padding: 0;
    width: 200px;
    max-width: 40vw;
  }

  .modal-field-desc {
    font-family: 'Archivo', sans-serif;
    font-size: 12px;
    font-weight: 300;
    color: var(--silver);
    opacity: 0.7;
    background: none;
    border: none;
    outline: none;
    pointer-events: none;
    padding: 0;
    width: 260px;
    max-width: 50vw;
    resize: none;
    line-height: 1.4;
  }

  /* Edit mode modal fields */
  body.edit-mode .modal-field-type,
  body.edit-mode .modal-field-desc {
    pointer-events: all;
    background: rgba(42,39,32,0.7);
    border: 1px solid rgba(200,120,32,0.3);
    padding: 5px 8px;
    border-radius: 1px;
    color: var(--cream);
    opacity: 1;
    backdrop-filter: blur(8px);
  }

  body.edit-mode .modal-field-type:focus,
  body.edit-mode .modal-field-desc:focus {
    border-color: var(--edit-accent);
    outline: none;
  }

  .modal-info-right {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 8px;
    pointer-events: all;
  }

  .pinterest-link {
    display: flex;
    align-items: center;
    gap: 6px;
    color: var(--silver);
    text-decoration: none;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.08em;
    opacity: 0.4;
    transition: opacity 0.2s;
  }

  .pinterest-link:hover { opacity: 0.9; color: var(--copper); }

  .keyboard-hint {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    color: var(--silver);
    opacity: 0.25;
    letter-spacing: 0.06em;
  }

  /* Modal edit button (opens editor panel) */
  .modal-edit-btn {
    display: none;
    background: rgba(200,120,32,0.15);
    border: 1px solid rgba(200,120,32,0.4);
    color: var(--edit-accent);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.08em;
    padding: 6px 12px;
    cursor: pointer;
    transition: all 0.2s;
    pointer-events: all;
  }

  .modal-edit-btn:hover {
    background: rgba(200,120,32,0.25);
  }

  body.edit-mode .modal-edit-btn { display: inline-flex; align-items: center; gap: 6px; }

  /* ─── EDITOR PANEL ─── */
  .editor-panel {
    position: fixed;
    top: 0;
    right: 0;
    bottom: 0;
    width: min(580px, 100vw);
    background: #0e0c0a;
    border-left: 1px solid rgba(200,120,32,0.2);
    z-index: 900;
    display: flex;
    flex-direction: column;
    transform: translateX(100%);
    transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
    box-shadow: -24px 0 60px rgba(0,0,0,0.6);
  }

  .editor-panel.open { transform: translateX(0); }

  .editor-header {
    padding: 14px 18px;
    border-bottom: 1px solid rgba(200,120,32,0.15);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    background: rgba(200,120,32,0.04);
  }

  .editor-title {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    color: var(--edit-accent);
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .editor-title::before {
    content: '';
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--edit-accent);
    animation: pulse 1.5s infinite;
  }

  .editor-actions {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .editor-body {
    flex: 1;
    overflow-y: auto;
  }

  .editor-body::-webkit-scrollbar { width: 3px; }
  .editor-body::-webkit-scrollbar-track { background: transparent; }
  .editor-body::-webkit-scrollbar-thumb { background: rgba(200,120,32,0.2); }

  .editor-col-headers {
    display: grid;
    grid-template-columns: 28px 44px 1fr 1fr;
    gap: 8px;
    padding: 8px 14px;
    border-bottom: 1px solid rgba(200,120,32,0.12);
    background: rgba(42,39,32,0.4);
    position: sticky;
    top: 0;
    z-index: 1;
  }

  .editor-col-header {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.1em;
    color: var(--edit-accent);
    text-transform: uppercase;
    opacity: 0.6;
  }

  .editor-row {
    display: grid;
    grid-template-columns: 28px 44px 1fr 1fr;
    gap: 8px;
    padding: 7px 14px;
    border-bottom: 1px solid rgba(176,168,144,0.05);
    align-items: start;
    transition: background 0.15s;
  }

  .editor-row:hover { background: rgba(200,120,32,0.04); }

  .editor-row-num {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    color: rgba(176,168,144,0.25);
    padding-top: 4px;
    text-align: right;
  }

  .editor-thumb {
    width: 38px;
    height: 38px;
    object-fit: cover;
    border-radius: 1px;
    background: var(--dim);
  }

  .editor-input {
    background: rgba(42,39,32,0.5);
    border: 1px solid rgba(176,168,144,0.1);
    color: var(--cream);
    font-family: 'Archivo', sans-serif;
    font-size: 12px;
    font-weight: 300;
    padding: 5px 8px;
    width: 100%;
    outline: none;
    resize: none;
    transition: border-color 0.2s;
  }

  .editor-input:focus { border-color: var(--edit-accent); }
  .editor-input::placeholder { color: rgba(176,168,144,0.2); font-style: italic; }
  textarea.editor-input { min-height: 38px; line-height: 1.4; }

  /* ─── TOAST ─── */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--dim);
    border: 1px solid rgba(176,168,144,0.2);
    color: var(--cream);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    padding: 10px 20px;
    z-index: 9998;
    transition: transform 0.3s;
    pointer-events: none;
    max-width: 90vw;
    text-align: center;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.success { border-color: #3a7a3a; color: #7aba7a; }
  .toast.error-t { border-color: var(--burgundy); color: #c05050; }

  /* ─── SHORTCUT HINT ─── */
  .shortcut-hint {
    position: fixed;
    bottom: 18px;
    right: 18px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    color: rgba(176,168,144,0.2);
    letter-spacing: 0.06em;
    z-index: 50;
    pointer-events: none;
  }

  /* ─── MOBILE ─── */
  @media (max-width: 600px) {
    header { padding: 10px 14px; }
    .header-title { font-size: 13px; }
    .status-text { display: none; }
    .btn { font-size: 10px; padding: 6px 10px; }

    .gallery-wrap { padding: 6px 4px; }
    .masonry { column-count: 3; column-gap: 4px; }
    .card { margin-bottom: 4px; }
    .card-overlay { display: none; }

    /* Mobile modal: fullscreen image */
    .modal-backdrop { background: #000; }

    .modal-info-strip {
      padding: 60px 14px 14px;
      flex-direction: column;
      align-items: flex-start;
      gap: 8px;
    }

    .modal-field-type {
      font-size: 10px;
      max-width: 80vw;
      width: auto;
    }

    .modal-field-desc {
      font-size: 11px;
      max-width: 85vw;
      width: auto;
    }

    .modal-info-right {
      flex-direction: row;
      align-items: center;
    }

    .keyboard-hint { display: none; }

    .editor-panel {
      width: 100vw;
      border-left: none;
    }

    .shortcut-hint { display: none; }
  }
</style>
</head>
<body>

<div class="edit-mode-bar"></div>

<header>
  <div class="header-title">EDETRI — <span>Visual Archive</span></div>
  <div class="header-actions">
    <div style="display:flex;align-items:center;gap:6px">
      <span class="status-dot loading" id="statusDot"></span>
      <span class="status-text" id="statusText">Loading...</span>
    </div>
    <!-- Publish button — only visible in edit mode -->
    <button class="btn btn-publish" id="publishBtn" onclick="publishToSheets()">▲ Publish</button>
    <!-- Edit mode toggle -->
    <button class="btn btn-edit-toggle" onclick="toggleEditMode()">
      <span class="edit-badge"></span>
      ✎ Edit <small style="opacity:0.5;margin-left:4px">Shift+E</small>
    </button>
  </div>
</header>

<main class="gallery-wrap">
  <div class="loading-state" id="loadingState">
    <div class="spinner"></div>
    <p>Fetching visual archive...</p>
  </div>
  <div class="masonry" id="masonry" style="display:none"></div>
</main>

<!-- Fullscreen Modal -->
<div class="modal-backdrop" id="modal" role="dialog" aria-modal="true">

  <!-- Fullscreen image -->
  <div class="modal-image-full">
    <img id="modalImg" src="" alt="" referrerpolicy="no-referrer">
  </div>

  <!-- Top bar -->
  <div class="modal-header">
    <div style="display:flex;align-items:center;gap:12px">
      <button class="modal-close" onclick="closeModal()" title="Close (Esc)">✕</button>
      <span class="modal-counter" id="modalCounter"></span>
    </div>
    <div class="nav-arrows">
      <button class="nav-btn" onclick="navigateModal(-1)" title="Previous (←)">←</button>
      <button class="nav-btn" onclick="navigateModal(1)" title="Next (→)">→</button>
    </div>
  </div>

  <!-- Bottom info strip -->
  <div class="modal-info-strip">
    <div class="modal-info-left">
      <div class="modal-color-row">
        <div class="modal-color-dot" id="modalColorDot" style="display:none"></div>
        <span class="modal-color-hex-text" id="modalColorHex"></span>
      </div>
      <input class="modal-field-type" id="modalType" type="text" placeholder="Type…" oninput="autoSaveModal()" readonly>
      <textarea class="modal-field-desc" id="modalDesc" placeholder="Description…" rows="2" oninput="autoSaveModal()" readonly></textarea>
    </div>
    <div class="modal-info-right">
      <!-- Open editor panel for this row -->
      <button class="modal-edit-btn" id="modalEditBtn" onclick="openEditorForCurrent()">⊞ Edit row</button>
      <a class="pinterest-link" id="modalPinterestLink" href="#" target="_blank" rel="noopener noreferrer" referrerpolicy="no-referrer">
        ↗ Pinterest
      </a>
      <span class="keyboard-hint">← → nav · Esc close</span>
    </div>
  </div>
</div>

<!-- Editor Panel (only opens manually) -->
<div class="editor-panel" id="editorPanel">
  <div class="editor-header">
    <span class="editor-title">Edit Mode — Field Editor</span>
    <div class="editor-actions">
      <button class="btn" onclick="copyForSheets()">⎘ Copy TSV</button>
      <button class="btn btn-primary" onclick="publishToSheets()">▲ Publish</button>
      <button class="modal-close" onclick="closeEditor()">✕</button>
    </div>
  </div>
  <div class="editor-body">
    <div class="editor-col-headers">
      <span class="editor-col-header">#</span>
      <span class="editor-col-header">Img</span>
      <span class="editor-col-header">Type (F)</span>
      <span class="editor-col-header">Description (G)</span>
    </div>
    <div id="editorRows"></div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Keyboard hint -->
<div class="shortcut-hint">Shift+E → edit mode</div>

<script>
  // ─── CONFIG ────────────────────────────────────────────────────
  const SHEET_ID = '1o3kX-cYFY8RjPWfQN5kzzGQf_2g-ZxJvan9Mu7Jf7pQ';
  // Range: B10:G — B=imgUrl, C=?, D=color, E=pinterest, F=type, G=desc
  // Original was C10:G (imgUrl=C, color=D, pinterest=E, type=F, desc=G)
  // Now imgUrl comes from B, so range is B10:G
  const GVIZ_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&headers=0&range=B10%3AG&gid=0`;
  const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyKGWSvisF5zoQFY2mdYlhcHAHqhr6Qd7uA5f3RRjR1c6pctWt9u7T7SWFNG9DGDNM7/exec';
  const LS_KEY = 'edetri-masonry-edits';

  let rows = [];
  let currentIdx = -1;
  let isEditMode = false;
  let editorOpen = false;

  // ─── LOCAL STORAGE ─────────────────────────────────────────────
  function loadEdits() {
    try { return JSON.parse(localStorage.getItem(LS_KEY) || '{}'); }
    catch { return {}; }
  }

  function saveEdit(rowNum, type, description) {
    const edits = loadEdits();
    edits[String(rowNum)] = { type, description };
    localStorage.setItem(LS_KEY, JSON.stringify(edits));
  }

  // ─── FETCH & RENDER ────────────────────────────────────────────
  async function init() {
    try {
      const res = await fetch(GVIZ_URL);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const text = await res.text();
      const jsonStr = text.slice(text.indexOf('(') + 1, text.lastIndexOf(')'));
      const json = JSON.parse(jsonStr);
      if (json.status !== 'ok') throw new Error('Spreadsheet data unavailable');

      const records = json.table.rows.map(row =>
        (row.c || []).map(cell => cell && cell.v != null ? String(cell.v) : '')
      );
      const edits = loadEdits();

      // range=B10:G → columns: 0=B(imgUrl) 1=C 2=D(color) 3=E(pinterest) 4=F(type) 5=G(desc)
      rows = [];
      for (let i = 0; i < records.length; i++) {
        const r = records[i];
        const rowNum = i + 10;
        const imgUrl = (r[0] || '').trim(); // B column
        if (!imgUrl) continue;

        const saved = edits[String(rowNum)] || {};
        rows.push({
          rowNum,
          imgUrl,                               // B
          // r[1] = C (unused / whatever is there)
          color:        (r[2] || '').trim(),    // D
          pinterestUrl: (r[3] || '').trim(),    // E
          type:         saved.type        !== undefined ? saved.type        : (r[4] || '').trim(), // F
          description:  saved.description !== undefined ? saved.description : (r[5] || '').trim(), // G
        });
      }

      renderMasonry();
      renderEditor();
      setStatus('ready', `${rows.length} images`);
    } catch (err) {
      setStatus('error', 'Failed to load');
      document.getElementById('loadingState').innerHTML =
        `<p style="color:var(--burgundy);font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.08em;text-align:center;padding:40px">
          Error: ${err.message}<br><br>
          <span style="opacity:.5">Check console or try via local server instead of file://</span>
        </p>`;
    }
  }

  function renderMasonry() {
    const masonry = document.getElementById('masonry');
    masonry.innerHTML = '';
    rows.forEach((row, idx) => {
      const card = document.createElement('div');
      card.className = 'card';
      card.dataset.idx = idx;
      card.onclick = () => openModal(idx);

      const img = document.createElement('img');
      img.src = row.imgUrl;
      img.alt = row.type || '';
      img.loading = 'lazy';
      img.referrerPolicy = 'no-referrer';
      img.onerror = () => {
        img.style.display = 'none';
        let ph = card.querySelector('.card-placeholder');
        if (!ph) {
          ph = document.createElement('div');
          ph.className = 'card-placeholder';
          card.insertBefore(ph, card.firstChild);
        }
        ph.style.background = row.color || 'var(--dim)';
        ph.textContent = row.color || '—';
      };

      const overlay = document.createElement('div');
      overlay.className = 'card-overlay';

      if (row.color) {
        const dot = document.createElement('div');
        dot.className = 'card-color';
        dot.style.background = row.color;
        overlay.appendChild(dot);
      }

      if (row.type) {
        const typeEl = document.createElement('span');
        typeEl.className = 'card-type';
        typeEl.textContent = row.type;
        overlay.appendChild(typeEl);
      }

      card.appendChild(img);
      card.appendChild(overlay);
      masonry.appendChild(card);
    });

    document.getElementById('loadingState').style.display = 'none';
    masonry.style.display = '';
  }

  // ─── MODAL ─────────────────────────────────────────────────────
  function openModal(idx) {
    currentIdx = idx;
    const row = rows[idx];

    document.getElementById('modalImg').src = row.imgUrl;

    // Color dot
    const dot = document.getElementById('modalColorDot');
    const hexEl = document.getElementById('modalColorHex');
    if (row.color) {
      dot.style.background = row.color;
      dot.style.display = 'block';
      hexEl.textContent = row.color.toUpperCase();
    } else {
      dot.style.display = 'none';
      hexEl.textContent = '';
    }

    // Fields
    const typeEl = document.getElementById('modalType');
    const descEl = document.getElementById('modalDesc');
    typeEl.value = row.type || '';
    descEl.value = row.description || '';

    // In edit mode, make fields editable
    setModalFieldsEditable(isEditMode);

    // Pinterest
    const link = document.getElementById('modalPinterestLink');
    if (row.pinterestUrl) {
      link.href = row.pinterestUrl;
      link.style.display = 'flex';
    } else {
      link.style.display = 'none';
    }

    document.getElementById('modalCounter').textContent = `${idx + 1} / ${rows.length}`;
    document.getElementById('modal').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeModal() {
    autoSaveModal();
    document.getElementById('modal').classList.remove('open');
    document.body.style.overflow = '';
    currentIdx = -1;
  }

  function navigateModal(dir) {
    if (currentIdx < 0) return;
    autoSaveModal();
    openModal((currentIdx + dir + rows.length) % rows.length);
  }

  function autoSaveModal() {
    if (currentIdx < 0 || !isEditMode) return;
    const type = document.getElementById('modalType').value;
    const description = document.getElementById('modalDesc').value;
    rows[currentIdx].type = type;
    rows[currentIdx].description = description;
    saveEdit(rows[currentIdx].rowNum, type, description);
    updateCardOverlay(currentIdx);
    syncEditorRow(currentIdx);
  }

  function setModalFieldsEditable(editable) {
    const typeEl = document.getElementById('modalType');
    const descEl = document.getElementById('modalDesc');
    if (editable) {
      typeEl.removeAttribute('readonly');
      descEl.removeAttribute('readonly');
    } else {
      typeEl.setAttribute('readonly', '');
      descEl.setAttribute('readonly', '');
    }
  }

  function openEditorForCurrent() {
    // Open editor panel and scroll to current row
    openEditor();
    if (currentIdx >= 0) {
      setTimeout(() => {
        const rowEl = document.querySelector(`#editorRows [data-row-idx="${currentIdx}"]`);
        if (rowEl) rowEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }, 400);
    }
  }

  // ─── EDIT MODE ─────────────────────────────────────────────────
  function toggleEditMode() {
    isEditMode = !isEditMode;
    document.body.classList.toggle('edit-mode', isEditMode);
    setModalFieldsEditable(isEditMode);

    if (!isEditMode && editorOpen) {
      closeEditor();
    }

    showToast(isEditMode ? '✎ Edit mode ON — fields unlocked' : '✓ Edit mode OFF', isEditMode ? '' : 'success');
  }

  // ─── EDITOR PANEL ──────────────────────────────────────────────
  function renderEditor() {
    const container = document.getElementById('editorRows');
    container.innerHTML = '';
    rows.forEach((row, idx) => {
      const div = document.createElement('div');
      div.className = 'editor-row';
      div.dataset.rowIdx = idx;

      const numEl = document.createElement('span');
      numEl.className = 'editor-row-num';
      numEl.textContent = row.rowNum;

      const thumb = document.createElement('img');
      thumb.className = 'editor-thumb';
      thumb.src = row.imgUrl;
      thumb.referrerPolicy = 'no-referrer';
      thumb.alt = '';
      thumb.loading = 'lazy';
      thumb.onerror = () => { thumb.style.background = row.color || 'var(--dim)'; thumb.src = ''; };

      const typeInput = document.createElement('input');
      typeInput.className = 'editor-input editor-type';
      typeInput.type = 'text';
      typeInput.value = row.type || '';
      typeInput.placeholder = 'Type…';
      typeInput.oninput = () => {
        rows[idx].type = typeInput.value;
        saveEdit(row.rowNum, typeInput.value, rows[idx].description);
        updateCardOverlay(idx);
        if (currentIdx === idx) {
          document.getElementById('modalType').value = typeInput.value;
        }
      };

      const descInput = document.createElement('textarea');
      descInput.className = 'editor-input editor-desc';
      descInput.value = row.description || '';
      descInput.placeholder = 'Description…';
      descInput.rows = 2;
      descInput.oninput = () => {
        rows[idx].description = descInput.value;
        saveEdit(row.rowNum, rows[idx].type, descInput.value);
        updateCardOverlay(idx);
        if (currentIdx === idx) {
          document.getElementById('modalDesc').value = descInput.value;
        }
      };

      div.appendChild(numEl);
      div.appendChild(thumb);
      div.appendChild(typeInput);
      div.appendChild(descInput);
      container.appendChild(div);
    });
  }

  function openEditor() {
    if (!isEditMode) {
      showToast('Enable edit mode first (Shift+E)', 'error-t');
      return;
    }
    document.getElementById('editorPanel').classList.add('open');
    editorOpen = true;
  }

  function closeEditor() {
    document.getElementById('editorPanel').classList.remove('open');
    editorOpen = false;
  }

  function updateCardOverlay(idx) {
    const card = document.querySelector(`.card[data-idx="${idx}"]`);
    if (!card) return;
    const overlay = card.querySelector('.card-overlay');
    if (!overlay) return;
    const typeEl = overlay.querySelector('.card-type');
    const row = rows[idx];
    if (row.type) {
      if (typeEl) { typeEl.textContent = row.type; }
      else {
        const el = document.createElement('span');
        el.className = 'card-type';
        el.textContent = row.type;
        overlay.appendChild(el);
      }
    } else if (typeEl) { typeEl.remove(); }
  }

  function syncEditorRow(idx) {
    const rowEl = document.querySelector(`#editorRows [data-row-idx="${idx}"]`);
    if (!rowEl) return;
    const row = rows[idx];
    const ti = rowEl.querySelector('.editor-type');
    const di = rowEl.querySelector('.editor-desc');
    if (ti && ti.value !== row.type) ti.value = row.type || '';
    if (di && di.value !== row.description) di.value = row.description || '';
  }

  // ─── PUBLISH TO SHEETS ─────────────────────────────────────────
  async function publishToSheets() {
    if (!isEditMode) {
      showToast('Enable edit mode first (Shift+E)', 'error-t');
      return;
    }

    const publishBtn = document.getElementById('publishBtn');
    const origText = publishBtn.textContent;
    publishBtn.textContent = '⟳ Publishing…';
    publishBtn.disabled = true;
    showToast('Publishing to Google Sheets…');

    const sorted = [...rows].sort((a, b) => a.rowNum - b.rowNum);
    const payload = sorted.map(r => ({
      row: r.rowNum,
      type: r.type || '',
      description: r.description || ''
    }));

    try {
      const res = await fetch(APPS_SCRIPT_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'updateRows', rows: payload })
      });
      // no-cors returns opaque response — assume success if no throw
      showToast(`✓ Published ${sorted.length} rows to Sheets`, 'success');
    } catch (err) {
      showToast(`✗ Publish failed: ${err.message}`, 'error-t');
    } finally {
      publishBtn.textContent = origText;
      publishBtn.disabled = false;
    }
  }

  // ─── COPY FOR SHEETS ───────────────────────────────────────────
  function copyForSheets() {
    const sorted = [...rows].sort((a, b) => a.rowNum - b.rowNum);
    const tsv = sorted.map(r => `${r.type || ''}\t${r.description || ''}`).join('\n');
    navigator.clipboard.writeText(tsv).then(() => {
      showToast(`✓ Copied ${sorted.length} rows — paste into F:G from row 10`);
    }).catch(() => {
      const ta = document.createElement('textarea');
      ta.value = tsv;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      showToast(`✓ Copied ${sorted.length} rows — paste into F:G from row 10`);
    });
  }

  // ─── HELPERS ───────────────────────────────────────────────────
  function setStatus(state, text) {
    document.getElementById('statusDot').className = `status-dot ${state}`;
    document.getElementById('statusText').textContent = text;
  }

  function showToast(msg, type = '') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast' + (type ? ` ${type}` : '');
    t.classList.add('show');
    clearTimeout(t._timer);
    t._timer = setTimeout(() => t.classList.remove('show'), 3000);
  }

  // ─── KEYBOARD SHORTCUTS ────────────────────────────────────────
  document.addEventListener('keydown', e => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') {
      if (e.key === 'Escape') e.target.blur();
      return;
    }

    // Shift+E → toggle edit mode
    if (e.shiftKey && e.key === 'E') {
      e.preventDefault();
      toggleEditMode();
      return;
    }

    const modal = document.getElementById('modal');
    if (modal.classList.contains('open')) {
      if (e.key === 'Escape') closeModal();
      if (e.key === 'ArrowLeft')  navigateModal(-1);
      if (e.key === 'ArrowRight') navigateModal(1);
    }
  });

  // Close modal clicking outside content
  document.getElementById('modal').addEventListener('click', e => {
    if (e.target === document.getElementById('modal') ||
        e.target === document.querySelector('.modal-image-full')) {
      closeModal();
    }
  });

  // ─── INIT ──────────────────────────────────────────────────────
  init();
</script>
</body>
</html>
